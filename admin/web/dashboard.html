<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GrowManager – Live Dashboard</title>
<style>
  :root {
    --green: #2e7d32;
    --green-light: #4caf50;
    --green-dark: #1b5e20;
    --bg: #121212;
    --surface: #1e1e1e;
    --surface2: #2a2a2a;
    --border: #333;
    --text: #e0e0e0;
    --text-dim: #888;
    --red: #ef5350;
    --orange: #ff9800;
    --yellow: #fbc02d;
    --blue: #42a5f5;
    --full: #4caf50;
    --limited: #fbc02d;
    --fallback: #ff9800;
    --monitor: #42a5f5;
    --safe: #9e9e9e;
    --fault: #ef5350;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header {
    background: var(--green-dark);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 2px solid var(--green);
  }
  .header-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .header-status { display: flex; align-items: center; gap: 16px; font-size: 13px; }
  .conn-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); display: inline-block; }
  .conn-dot.connected { background: var(--green-light); box-shadow: 0 0 6px var(--green-light); }
  .last-update { color: var(--text-dim); font-size: 12px; }

  /* Alarm Banner */
  .alarm-banner {
    background: rgba(239,83,80,0.15);
    border-left: 4px solid var(--red);
    padding: 10px 20px;
    font-size: 13px;
    display: none;
  }
  .alarm-banner.visible { display: flex; align-items: center; gap: 12px; }

  /* Main */
  .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* Global stats bar */
  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-chip .label { color: var(--text-dim); }
  .stat-chip .value { font-weight: 700; font-size: 15px; }

  /* Groups grid */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* Group card */
  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .group-card:hover { border-color: var(--green); }

  .card-header {
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .health-badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* Climate values */
  .climate-row {
    display: flex; gap: 0;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .climate-val {
    flex: 1; text-align: center;
    border-right: 1px solid var(--border);
  }
  .climate-val:last-child { border-right: none; }
  .climate-num { font-size: 24px; font-weight: 700; color: var(--green-light); }
  .climate-num.null-val { color: var(--text-dim); font-size: 18px; }
  .climate-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; }

  /* Meta row */
  .meta-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: 8px 16px;
    font-size: 12px; color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  .meta-tag {
    background: var(--surface2);
    padding: 2px 8px; border-radius: 3px;
  }
  .meta-tag.day { color: #ffd54f; }
  .meta-tag.night { color: #90caf9; }

  /* Actuators */
  .actuators { padding: 10px 16px; }
  .act-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .actuator-row {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .actuator-row:last-child { border-bottom: none; }
  .act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .act-dot.on { background: var(--green-light); box-shadow: 0 0 5px var(--green-light); }
  .act-dot.off { background: var(--text-dim); }
  .act-name { flex: 1; }
  .act-state { font-weight: 600; font-size: 12px; }
  .act-state.on { color: var(--green-light); }
  .act-state.off { color: var(--text-dim); }
  .act-percent { font-size: 11px; color: var(--blue); }

  /* Bar for percent */
  .percent-bar-wrap { flex: 1; background: var(--surface2); border-radius: 2px; height: 4px; max-width: 80px; }
  .percent-bar-fill { height: 100%; border-radius: 2px; background: var(--green-light); transition: width 0.5s; }

  /* Alarm list in card */
  .card-alarms { padding: 8px 16px; }
  .card-alarm {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 12px;
  }
  .sev-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Irrigation badge */
  .irrig-badge {
    margin: 0 16px 8px;
    background: rgba(66,165,245,0.15);
    border: 1px solid var(--blue);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px; color: var(--blue);
    display: none;
  }
  .irrig-badge.running { display: block; }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center; padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state h2 { color: var(--text); margin-bottom: 8px; }

  /* Reconnect overlay */
  .reconnect-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center;
    z-index: 999;
    flex-direction: column; gap: 16px;
  }
  .reconnect-overlay.visible { display: flex; }
  .reconnect-overlay p { font-size: 18px; }

  /* Spinner */
  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--green-light);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    🌿 GrowManager
  </div>
  <div class="header-status">
    <span class="last-update" id="lastUpdate">–</span>
    <span id="connDot" class="conn-dot"></span>
    <span id="connLabel">Verbinde…</span>
  </div>
</div>

<div class="alarm-banner" id="alarmBanner">
  <span>⚠</span>
  <span id="alarmBannerText"></span>
</div>

<div class="main">
  <div class="stats-bar" id="statsBar"></div>
  <div class="groups-grid" id="groupsGrid">
    <div class="empty-state">
      <div class="spinner"></div>
      <p style="margin-top:20px;color:var(--text-dim)">Verbinde mit Adapter…</p>
    </div>
  </div>
</div>

<div class="reconnect-overlay" id="reconnectOverlay">
  <div class="spinner"></div>
  <p>Verbindung unterbrochen – verbinde neu…</p>
</div>

<script>
// ============================================================
// GrowManager Live Dashboard – Client Script
// ============================================================

const HEALTH_COLORS = {
  FULL: 'var(--full)',
  LIMITED: 'var(--limited)',
  FALLBACK: 'var(--fallback)',
  MONITOR_ONLY: 'var(--monitor)',
  SAFE: 'var(--safe)',
  FAULT: 'var(--fault)',
};
const SEV_COLORS = {
  critical: 'var(--red)',
  fault: 'var(--orange)',
  warning: 'var(--yellow)',
  info: 'var(--blue)',
};
const TYPE_ICONS = {
  light: '💡', exhaustFan: '🌀', supplyFan: '🌬️', circulationFan: '🔄',
  heating: '🔥', cooling: '❄️', humidifier: '💧', dehumidifier: '🌵',
  irrigation: '🚿', co2Valve: '💨', damper: '🎚️', custom: '⚙️',
};

let eventSource = null;
let reconnectTimer = null;
let connected = false;

function fmt(val, unit, decimals = 1) {
  if (val === null || val === undefined) return '<span style="color:var(--text-dim)">–</span>';
  return `${Number(val).toFixed(decimals)}${unit}`;
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('de-DE');
}

function healthBadgeHtml(health) {
  const color = HEALTH_COLORS[health] ?? 'var(--safe)';
  return `<span class="health-badge" style="background:${color}22;color:${color};border:1px solid ${color}">${health}</span>`;
}

function renderStats(state) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-chip">
      <span class="label">Adapter</span>
      <span class="value" style="color:${state.health === 'running' ? 'var(--green-light)' : 'var(--orange)'}">${state.health}</span>
    </div>
    <div class="stat-chip">
      <span class="label">Gruppen</span>
      <span class="value">${state.groups.length}</span>
    </div>
    <div class="stat-chip">
      <span class="label">Alarme</span>
      <span class="value" style="color:${state.activeAlarms > 0 ? 'var(--red)' : 'var(--green-light)'}">${state.activeAlarms}</span>
    </div>
    <div class="stat-chip">
      <span class="label">Version</span>
      <span class="value" style="color:var(--text-dim)">${state.adapterVersion}</span>
    </div>
  `;
}

function renderAlarmBanner(state) {
  const banner = document.getElementById('alarmBanner');
  const txt = document.getElementById('alarmBannerText');
  if (state.activeAlarms > 0) {
    txt.textContent = `${state.activeAlarms} aktive${state.activeAlarms === 1 ? 'r' : ''} Alarm${state.activeAlarms !== 1 ? 'e' : ''}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function actuatorHtml(act) {
  const isOn = act.command === true || (typeof act.command === 'number' && act.command > 0);
  const isPercent = typeof act.command === 'number' && act.command > 0;
  const pct = isPercent ? act.command : null;
  const icon = TYPE_ICONS[act.type] ?? '⚙️';

  let rightSide = '';
  if (isPercent && pct !== null) {
    rightSide = `
      <span class="act-percent">${Math.round(pct)}%</span>
      <div class="percent-bar-wrap"><div class="percent-bar-fill" style="width:${pct}%"></div></div>
    `;
  } else {
    rightSide = `<span class="act-state ${isOn ? 'on' : 'off'}">${isOn ? 'EIN' : 'AUS'}</span>`;
  }

  return `
    <div class="actuator-row">
      <div class="act-dot ${isOn ? 'on' : 'off'}"></div>
      <span class="act-name">${icon} ${act.name}</span>
      ${rightSide}
    </div>
  `;
}

function groupCardHtml(g) {
  const healthColor = HEALTH_COLORS[g.health] ?? 'var(--safe)';
  const dayNight = g.isDay
    ? '<span class="meta-tag day">☀ Tag</span>'
    : '<span class="meta-tag night">🌙 Nacht</span>';

  const actHtml = g.actuators.length > 0
    ? `<div class="actuators"><div class="act-title">Aktoren</div>${g.actuators.map(actuatorHtml).join('')}</div>`
    : '';

  const alarmHtml = g.alarms.length > 0
    ? `<div class="card-alarms">${g.alarms.map(a => {
        const c = SEV_COLORS[a.severity] ?? 'var(--text-dim)';
        return `<div class="card-alarm"><div class="sev-dot" style="background:${c}"></div><span style="color:${c}">[${a.severity.toUpperCase()}]</span> ${a.code}: ${a.message}</div>`;
      }).join('')}</div>`
    : '';

  const irrigBadge = g.irrigationRunning
    ? '<div class="irrig-badge running">💧 Bewässerung aktiv</div>'
    : '<div class="irrig-badge"></div>';

  const soilHtml = g.soilMoisture !== null
    ? `<div class="climate-val"><div class="climate-num">${g.soilMoisture.toFixed(0)}<small style="font-size:14px;font-weight:400">%</small></div><div class="climate-label">Boden</div></div>`
    : '';

  return `
    <div class="group-card" id="card-${g.id}">
      <div class="card-header">
        <div class="card-name">
          <div class="color-dot" style="background:${g.color}"></div>
          ${g.name}
        </div>
        ${healthBadgeHtml(g.health)}
      </div>
      <div class="climate-row">
        <div class="climate-val">
          <div class="climate-num ${g.temperature === null ? 'null-val' : ''}">${g.temperature !== null ? g.temperature.toFixed(1) + '°' : '–'}</div>
          <div class="climate-label">Temperatur</div>
        </div>
        <div class="climate-val">
          <div class="climate-num ${g.humidity === null ? 'null-val' : ''}">${g.humidity !== null ? g.humidity.toFixed(0) + '%' : '–'}</div>
          <div class="climate-label">Luftfeuchte</div>
        </div>
        <div class="climate-val">
          <div class="climate-num ${g.vpd === null ? 'null-val' : ''}">${g.vpd !== null ? g.vpd.toFixed(2) : '–'}</div>
          <div class="climate-label">VPD kPa</div>
        </div>
        ${soilHtml}
      </div>
      <div class="meta-row">
        <span class="meta-tag">${g.phase}</span>
        <span class="meta-tag">${g.mode}</span>
        ${dayNight}
        <span class="meta-tag" style="margin-left:auto">Q: ${g.sensorQuality}%</span>
      </div>
      ${irrigBadge}
      ${actHtml}
      ${alarmHtml}
    </div>
  `;
}

function render(state) {
  renderStats(state);
  renderAlarmBanner(state);

  const grid = document.getElementById('groupsGrid');
  if (state.groups.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <h2>Keine Gruppen konfiguriert</h2>
        <p>Lege Gruppen in der ioBroker Admin-Oberfläche an.</p>
      </div>
    `;
    return;
  }
  grid.innerHTML = state.groups.map(groupCardHtml).join('');
}

function setConnected(val) {
  connected = val;
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  const overlay = document.getElementById('reconnectOverlay');
  dot.className = 'conn-dot' + (val ? ' connected' : '');
  label.textContent = val ? 'Verbunden' : 'Getrennt';
  if (val) overlay.classList.remove('visible');
  else overlay.classList.add('visible');
}

function updateTimestamp() {
  document.getElementById('lastUpdate').textContent = 'Zuletzt: ' + new Date().toLocaleTimeString('de-DE');
}

function connect() {
  if (eventSource) {
    eventSource.close();
    eventSource = null;
  }
  clearTimeout(reconnectTimer);

  eventSource = new EventSource('/api/events');

  eventSource.onopen = () => {
    setConnected(true);
  };

  eventSource.onmessage = (evt) => {
    try {
      const state = JSON.parse(evt.data);
      render(state);
      updateTimestamp();
      if (!connected) setConnected(true);
    } catch (e) {
      console.error('Parse error', e);
    }
  };

  eventSource.onerror = () => {
    setConnected(false);
    eventSource.close();
    eventSource = null;
    reconnectTimer = setTimeout(connect, 3000);
  };
}

// Initiale Verbindung
connect();

// Fallback: alle 15s Snapshot holen wenn SSE nicht verfügbar
setInterval(() => {
  if (!connected) {
    fetch('/api/state')
      .then(r => r.json())
      .then(state => { render(state); updateTimestamp(); setConnected(true); })
      .catch(() => {});
  }
}, 15000);
</script>
</body>
</html>
