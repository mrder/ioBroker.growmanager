// Gepufferter Proxy-Refresh: lädt Bild über /api/cam-proxy (same-origin → kein CORS)
// Erst bei Erfolg wird camCache + Thumbnail aktualisiert. Kein Flash bei Fehler.
async function refreshCamThumb(groupId, url) {
  const proxyUrl = '/api/cam-proxy?url=' + encodeURIComponent(url) + '&t=' + Date.now();
  try {
    const resp = await fetch(proxyUrl);
    if (!resp.ok) return; // Kamera antwortet nicht → altes Bild bleibt
    const blob = await resp.blob();
    if (!blob.type.startsWith('image/')) return;
    // Alten ObjectURL freigeben
    if (camCache[groupId] && camCache[groupId].startsWith('blob:')) {
      URL.revokeObjectURL(camCache[groupId]);
    }
    const objUrl = URL.createObjectURL(blob);
    camCache[groupId] = objUrl;
    // Nur sichtbar machen wenn Bild korrekt decodiert wurde
    const tmp = new Image();
    tmp.onload = () => {
      camCache[groupId] = objUrl; // bereits gesetzt, aber sicher
      const el = document.getElementById('cam-thumb-' + groupId);
      if (el) { el.src = objUrl; el.style.opacity = '1'; }
    };
    tmp.onerror = () => URL.revokeObjectURL(objUrl);
    tmp.src = objUrl;
  } catch { /* Netzwerkfehler → altes Bild bleibt */ }
}

// Nach re-render: sofort aus Cache anzeigen, dann im Hintergrund aktualisieren
function initCamThumbs() {
  for (const [gid, url] of Object.entries(camUrls)) {
    const el = document.getElementById('cam-thumb-' + gid);
    if (!el) continue;
    if (camCache[gid]) {
      // Cache vorhanden → sofort anzeigen, kein Flackern
      el.src = camCache[gid];
      el.style.opacity = '1';
    } else {
      // Erstmalig laden
      refreshCamThumb(gid, url);
    }
  }
}

// Auto-Refresh alle 10 Sekunden
setInterval(() => {
  for (const [gid, url] of Object.entries(camUrls)) {
    refreshCamThumb(gid, url);
  }
}, 10000);

// ---- Analyse-Modal ----
let cropModal = null, cropCanvas = null, cropCtx = null, cropOverlay = null;
let cropStart = null, cropRect = null, cropGroupId = null;

function buildCropModal() {
  if (cropModal) return;
  cropModal = document.createElement('div');
  cropModal.className = 'crop-modal';
  cropModal.innerHTML = `
    <div class="crop-modal-box">
      <p class="crop-modal-title">🔬 Pflanzenbild analysieren</p>
      <p class="crop-modal-hint">Bereich ziehen um nur einen Ausschnitt zu analysieren — oder ganzes Bild senden.</p>
      <div class="crop-toolbar">
        <button class="crop-btn crop-btn-upload" onclick="cropUploadFile()">📂 Anderes Bild laden</button>
        <span id="crop-filename" style="font-size:11px;color:#888"></span>
      </div>
      <div class="crop-canvas-wrap" id="crop-wrap">
        <canvas id="crop-canvas"></canvas>
        <div class="crop-overlay" id="crop-overlay"></div>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button id="crop-analyze-btn" class="crop-btn crop-btn-primary" onclick="doCropAnalyze()">Analysieren (Plant.id)</button>
        <button class="crop-btn crop-btn-secondary" onclick="closeCropModal()">Abbrechen</button>
        <button class="crop-btn crop-btn-secondary" onclick="cropClearSelection()" style="font-size:11px">Auswahl aufheben</button>
      </div>
      <div id="crop-status" style="font-size:12px;color:#666;margin-top:8px;min-height:18px"></div>
    </div>`;
  document.body.appendChild(cropModal);

  cropCanvas = cropModal.querySelector('#crop-canvas');
  cropOverlay = cropModal.querySelector('#crop-overlay');
  cropCtx = cropCanvas.getContext('2d');

  cropCanvas.addEventListener('mousedown', e => {
    const r = cropCanvas.getBoundingClientRect();
    cropStart = { x: e.clientX - r.left, y: e.clientY - r.top };
    cropRect = null;
    cropOverlay.style.display = 'none';
  });
  cropCanvas.addEventListener('mousemove', e => {
    if (!cropStart) return;
    const r = cropCanvas.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const rx = Math.min(cropStart.x, x), ry = Math.min(cropStart.y, y);
    const rw = Math.abs(x - cropStart.x), rh = Math.abs(y - cropStart.y);
    cropOverlay.style.display = 'block';
    cropOverlay.style.left = rx + 'px'; cropOverlay.style.top = ry + 'px';
    cropOverlay.style.width = rw + 'px'; cropOverlay.style.height = rh + 'px';
    cropRect = { x: rx, y: ry, w: rw, h: rh };
  });
  cropCanvas.addEventListener('mouseup', () => { cropStart = null; });
  cropModal.addEventListener('click', e => { if (e.target === cropModal) closeCropModal(); });
}

function cropClearSelection() {
  cropRect = null;
  if (cropOverlay) cropOverlay.style.display = 'none';
}

function loadImageOntoCanvas(src, label, isCrossOrigin) {
  const statusEl = cropModal.querySelector('#crop-status');
  statusEl.textContent = 'Bild wird geladen...';
  if (label) cropModal.querySelector('#crop-filename').textContent = label;
  cropCanvas.width = 10; cropCanvas.height = 10; // Reset
  cropRect = null;
  if (cropOverlay) cropOverlay.style.display = 'none';

  const img = new Image();
  if (isCrossOrigin) img.crossOrigin = 'anonymous';
  img.onload = () => {
    const maxW = Math.min(img.naturalWidth, Math.floor(window.innerWidth * 0.85));
    const scale = maxW / img.naturalWidth;
    cropCanvas.width = Math.floor(img.naturalWidth * scale);
    cropCanvas.height = Math.floor(img.naturalHeight * scale);
    cropCtx.drawImage(img, 0, 0, cropCanvas.width, cropCanvas.height);
    statusEl.textContent = isCrossOrigin ? '' : 'Tipp: Ohne CORS-Header kann kein Ausschnitt exportiert werden — lade stattdessen ein Foto hoch.';
  };
  img.onerror = () => {
    statusEl.textContent = 'Bild konnte nicht geladen werden. Bitte Foto hochladen.';
  };
  img.src = src;
}

function openAnalysisModal(groupId, url) {
  cropGroupId = groupId;
  buildCropModal();
  cropModal.classList.add('open');
  const ts = new Date().toLocaleTimeString('de-DE');
  const cached = camCache[groupId];
  if (cached) {
    // Gecachtes ObjectURL ist same-origin → Canvas wird nicht tainted → toDataURL klappt
    loadImageOntoCanvas(cached, 'Kamera-Snapshot ' + ts, true);
  } else {
    // Noch kein Cache → über Proxy laden (same-origin)
    const proxyUrl = '/api/cam-proxy?url=' + encodeURIComponent(url) + '&t=' + Date.now();
    loadImageOntoCanvas(proxyUrl, 'Kamera-Snapshot ' + ts, true);
  }
}

function cropUploadFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      // data-URL from FileReader: same-origin, crossOrigin=true so toDataURL works
      loadImageOntoCanvas(ev.target.result, file.name, true);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function closeCropModal() {
  if (cropModal) cropModal.classList.remove('open');
}

async function doCropAnalyze() {
  const statusEl = cropModal.querySelector('#crop-status');
  statusEl.textContent = '⏳ Analyse läuft...';
  cropModal.querySelector('#crop-analyze-btn').disabled = true;

  let base64;
  try {
    const offscreen = document.createElement('canvas');
    if (cropRect && cropRect.w > 10 && cropRect.h > 10) {
      offscreen.width = cropRect.w;
      offscreen.height = cropRect.h;
      offscreen.getContext('2d').drawImage(cropCanvas, cropRect.x, cropRect.y, cropRect.w, cropRect.h, 0, 0, cropRect.w, cropRect.h);
    } else {
      offscreen.width = cropCanvas.width;
      offscreen.height = cropCanvas.height;
      offscreen.getContext('2d').drawImage(cropCanvas, 0, 0);
    }
    base64 = offscreen.toDataURL('image/jpeg', 0.85);
  } catch(e) {
    // SecurityError: canvas tainted by cross-origin image (no CORS headers on camera)
    const isCors = String(e).toLowerCase().includes('security') || String(e).toLowerCase().includes('taint');
    statusEl.textContent = isCors
      ? '⚠ Kamera-URL hat keine CORS-Erlaubnis. Bitte Foto hochladen (📂 Anderes Bild laden).'
      : '⚠ Fehler: ' + e;
    cropModal.querySelector('#crop-analyze-btn').disabled = false;
    return;
  }

  try {
    const resp = await fetch('/api/plant-analysis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64 }),
    });
    const data = await resp.json();
    closeCropModal();
    showPlantResult(cropGroupId, data);
  } catch(e) {
    statusEl.textContent = '⚠ Netzwerkfehler: ' + e;
  }
  cropModal.querySelector('#crop-analyze-btn').disabled = false;
}

function showPlantResult(groupId, data) {
  const el = document.getElementById('plant-result-' + groupId);
  if (!el) return;

  if (data.error) {
    el.style.display = 'block';
    el.innerHTML = `<div class="plant-result-title">⚠ Analyse fehlgeschlagen</div><div style="color:#d32f2f;font-size:12px">${data.error}</div>`;
    return;
  }

  const health = data.result?.is_healthy;
  const diseases = data.result?.disease?.suggestions ?? [];
  const isHealthy = health?.binary === true || health?.probability > 0.85;

  let html = `<div class="plant-result-title">🔬 Plant.id Analyse`;
  if (isHealthy) html += ' <span style="color:#4caf50">✓ Gesund</span>';
  else html += ' <span style="color:#f44336">⚠ Probleme erkannt</span>';
  html += `</div>`;

  if (diseases.length === 0) {
    html += '<div style="font-size:12px;color:#666">Keine Krankheiten oder Mängel erkannt.</div>';
  } else {
    diseases.slice(0, 5).forEach(d => {
      const pct = Math.round((d.probability ?? 0) * 100);
      const cls = pct >= 60 ? '' : pct >= 35 ? 'medium' : 'low';
      html += `<div class="plant-disease-row">
        <span style="flex:0 0 44px;font-size:11px;color:#666">${pct}%</span>
        <div class="plant-conf-bar"><div class="plant-conf-fill ${cls}" style="width:${pct}%"></div></div>
        <span style="font-size:12px;flex:1">${d.name ?? '–'}</span>
      </div>`;
    });
  }

  if (data.result?.disease?.question?.suggestions) {
    // similar_images Ergebnisse
    const imgs = data.result.disease.question.suggestions.slice(0, 2);
    if (imgs.length > 0) {
      html += `<div style="font-size:11px;color:#666;margin-top:6px">Ähnliche Bilder aus DB:</div>
        <div style="display:flex;gap:6px;margin-top:4px">`;
      imgs.forEach(s => {
        if (s.similar_images?.[0]?.url) {
          html += `<img src="${s.similar_images[0].url}" style="width:56px;height:56px;object-fit:cover;border-radius:4px;border:1px solid var(--border)" />`;
        }
      });
      html += '</div>';
    }
  }

  html += `<div style="font-size:10px;color:#aaa;margin-top:6px">Plant.id v3 · ${new Date().toLocaleString('de-DE')}</div>`;
  el.innerHTML = html;
  el.style.display = 'block';
}

// Crop-Modal schließen mit Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCropModal(); });
</script>
</body>
</html>
