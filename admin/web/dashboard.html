async function wikiSave(id) {
  const g = (elId) => document.getElementById(elId);
  const name = g('wf-name').value.trim();
  if (!name) { alert('Bitte Sortennamen eingeben.'); return; }
  const tags = (val) => val.split(',').map(s => s.trim()).filter(Boolean);

  const payload = {
    name,
    type: g('wf-type').value,
    sativaPercent: +g('wf-sativa').value || 50,
    breeder: g('wf-breeder').value.trim(),
    difficulty: g('wf-difficulty').value,
    growWeeks: +g('wf-grow').value || 4,
    bloomWeeks: +g('wf-bloom').value || 8,
    yieldGramsPerM2: g('wf-yield').value !== '' ? +g('wf-yield').value : undefined,
    height: g('wf-height').value,
    tempDayMin: +g('wf-tDayMin').value,
    tempDayMax: +g('wf-tDayMax').value,
    tempNightMin: +g('wf-tNightMin').value,
    tempNightMax: +g('wf-tNightMax').value,
    humidityVeg: +g('wf-humVeg').value,
    humidityBloom: +g('wf-humBloom').value,
    vpdMin: +g('wf-vpdMin').value,
    vpdMax: +g('wf-vpdMax').value,
    thcPercent: g('wf-thc').value !== '' ? +g('wf-thc').value : undefined,
    cbdPercent: g('wf-cbd').value !== '' ? +g('wf-cbd').value : undefined,
    aroma: tags(g('wf-aroma').value),
    effect: tags(g('wf-effect').value),
    notes: g('wf-notes').value.trim(),
  };

  try {
    const url = id ? `/api/strains/${id}` : '/api/strains';
    const method = id ? 'PUT' : 'POST';
    const r = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!r.ok) throw new Error(await r.text());
    const saved = await r.json();
    wikiSelected = saved.id;
    await wikiLoad();
  } catch(e) {
    alert('Fehler beim Speichern: ' + e);
  }
}

async function wikiDelete(id) {
  const s = wikiStrains.find(x => x.id === id);
  if (!confirm(`Sorte "${s?.name}" wirklich löschen?\n\nDieser Vorgang kann nicht rückgängig gemacht werden.`)) return;
  if (!confirm(`Letzte Bestätigung:\n\nSind Sie wirklich sicher, dass Sie "${s?.name}" unwiderruflich löschen möchten?`)) return;
  try {
    const r = await fetch(`/api/strains/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    wikiSelected = null;
    await wikiLoad();
  } catch(e) {
    alert('Fehler beim Löschen: ' + e);
  }
}

// Wind-Sim & Block-Countdown: tickt sekündlich im Browser — unabhängig vom SSE-Zyklus
const _ivCountdown = setInterval(() => {
  const now = Date.now();
  document.querySelectorAll('.ws-cd').forEach(el => {
    const until = +el.dataset.until;
    const isOn = el.dataset.on === 'true';
    const rem = Math.max(0, Math.round((until - now) / 1000));
    const m = Math.floor(rem / 60), s = rem % 60;
    const timeStr = m > 0 ? `${m}m ${s.toString().padStart(2,'0')}s` : `${s}s`;
    el.textContent = `🌀 ${isOn ? 'EIN' : 'AUS'} noch ${timeStr}`;
    el.style.color = isOn ? 'var(--accent)' : 'var(--muted)';
  });
  document.querySelectorAll('.blk-cd[data-until]').forEach(el => {
    const until = +el.dataset.until;
    const rem = Math.max(0, Math.round((until - now) / 1000));
    const m = Math.floor(rem / 60), s = rem % 60;
    const timeStr = m > 0 ? `${m}m ${s}s` : `${s}s`;
    el.textContent = `⏱ ${timeStr}`;
  });
}, 1000);

// Vote-Tooltip: Fixed-Overlay (escaped aus overflow:hidden der Card)
// ============================================================
(function() {
  const overlay = document.getElementById('vote-tooltip-fixed');
  if (!overlay) return;

  document.addEventListener('mouseover', function(e) {
    const el = e.target.closest('.act-soll-voting');
    if (!el) return;
    const data = el.querySelector('.voting-tooltip-data');
    if (!data) return;
    overlay.innerHTML = data.innerHTML;
    overlay.style.display = 'block';
    // Position: oberhalb des Elements, linksbündig aber innerhalb des Viewports
    const rect = el.getBoundingClientRect();
    const ttW = overlay.offsetWidth || 220;
    const ttH = overlay.offsetHeight || 80;
    let top = rect.top - ttH - 8;
    let left = rect.left;
    if (top < 4) top = rect.bottom + 8;
    if (left + ttW > window.innerWidth - 8) left = window.innerWidth - ttW - 8;
    if (left < 4) left = 4;
    overlay.style.top  = top  + 'px';
    overlay.style.left = left + 'px';
  });

  document.addEventListener('mouseout', function(e) {
    const el = e.target.closest('.act-soll-voting');
    if (el && !el.contains(e.relatedTarget)) {
      overlay.style.display = 'none';
    }
  });
})();

// Gepufferter Proxy-Refresh: lädt Bild über /api/cam-proxy (same-origin → kein CORS)
// Erst bei Erfolg wird camCache + Thumbnail aktualisiert. Kein Flash bei Fehler.
async function refreshCamThumb(groupId, url) {
  if (camInFlight[groupId]) return; // vorheriger Refresh noch aktiv → überspringen
  camInFlight[groupId] = true;
  const proxyUrl = '/api/cam-proxy?url=' + encodeURIComponent(url) + '&t=' + Date.now();
  try {
    const resp = await fetch(proxyUrl);
    if (!resp.ok) return; // Kamera antwortet nicht → altes Bild bleibt
    const blob = await resp.blob();
    if (!blob.type.startsWith('image/')) return;
    const objUrl = URL.createObjectURL(blob);
    // Nur sichtbar machen wenn Bild korrekt decodiert wurde
    const tmp = new Image();
    tmp.onload = () => {
      // Alten ObjectURL erst jetzt freigeben, wenn neues Bild bereit ist
      if (camCache[groupId] && camCache[groupId].startsWith('blob:')) {
        URL.revokeObjectURL(camCache[groupId]);
      }
      camCache[groupId] = objUrl;
      const el = document.getElementById('cam-thumb-' + groupId);
      if (el) { el.src = objUrl; el.style.opacity = '1'; }
    };
    tmp.onerror = () => URL.revokeObjectURL(objUrl);
    tmp.src = objUrl;
  } catch { /* Netzwerkfehler → altes Bild bleibt */ }
  finally { camInFlight[groupId] = false; }
}

// Nach re-render: sofort aus Cache anzeigen, dann im Hintergrund aktualisieren
function initCamThumbs() {
  for (const [gid, url] of Object.entries(camUrls)) {
    const el = document.getElementById('cam-thumb-' + gid);
    if (!el) continue;
    if (camCache[gid]) {
      // Cache vorhanden → sofort anzeigen, kein Flackern
      el.src = camCache[gid];
      el.style.opacity = '1';
    } else {
      // Erstmalig laden
      refreshCamThumb(gid, url);
    }
  }
}

// Auto-Refresh alle 10 Sekunden
const _ivCamRefresh = setInterval(() => {
  for (const [gid, url] of Object.entries(camUrls)) {
    refreshCamThumb(gid, url);
  }
}, 10000);

window.addEventListener('beforeunload', () => {
  clearInterval(_ivReconnect);
  clearInterval(_ivCountdown);
  clearInterval(_ivCamRefresh);
});

// ---- Analyse-Modal ----
let cropModal = null, cropCanvas = null, cropCtx = null, cropOverlay = null;
let cropStart = null, cropRect = null, cropGroupId = null;
let cropZoom = 1.0;
const ZOOM_MIN = 0.2, ZOOM_MAX = 5.0, ZOOM_STEP = 0.25;

function setCropZoom(z) {
  cropZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z));
  if (!cropCanvas) return;
  const cssW = Math.round(cropCanvas.width  * cropZoom);
  const cssH = Math.round(cropCanvas.height * cropZoom);
  cropCanvas.style.width  = cssW + 'px';
  cropCanvas.style.height = cssH + 'px';
  // crop-canvas-wrap muss genauso groß sein damit Overlay korrekt passt
  const wrap = document.getElementById('crop-wrap');
  if (wrap) { wrap.style.width = cssW + 'px'; wrap.style.height = cssH + 'px'; }
  const btn = document.getElementById('crop-zoom-label');
  if (btn) btn.textContent = Math.round(cropZoom * 100) + '%';
  // Auswahl-Overlay zurücksetzen (Koordinaten stimmen nicht mehr nach Zoom)
  cropRect = null;
  if (cropOverlay) cropOverlay.style.display = 'none';
}

function buildCropModal() {
  if (cropModal) return;
  cropModal = document.createElement('div');
  cropModal.className = 'crop-modal';
  cropModal.innerHTML = `
    <div class="crop-modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <p class="crop-modal-title">🔬 Pflanzenbild analysieren</p>
        <button class="crop-btn crop-btn-secondary" onclick="closeCropModal()" style="padding:4px 10px;font-size:12px">✕ Schliessen</button>
      </div>
      <p class="crop-modal-hint">Bereich ziehen um nur einen Ausschnitt zu analysieren — oder ganzes Bild senden.</p>
      <div class="crop-toolbar">
        <button class="crop-btn crop-btn-upload" onclick="cropUploadFile()">📂 Anderes Bild laden</button>
        <span id="crop-filename" style="font-size:11px;color:#888"></span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
          <button class="crop-btn crop-btn-secondary" onclick="setCropZoom(cropZoom - ZOOM_STEP)" style="padding:3px 9px;font-size:15px;line-height:1">−</button>
          <span id="crop-zoom-label" style="font-size:12px;min-width:38px;text-align:center">100%</span>
          <button class="crop-btn crop-btn-secondary" onclick="setCropZoom(cropZoom + ZOOM_STEP)" style="padding:3px 9px;font-size:15px;line-height:1">+</button>
          <button class="crop-btn crop-btn-secondary" onclick="setCropZoom(1)" style="padding:3px 8px;font-size:11px">1:1</button>
          <button class="crop-btn crop-btn-secondary" onclick="fitZoom()" style="padding:3px 8px;font-size:11px">Fit</button>
        </div>
      </div>
      <div class="crop-canvas-scroll">
        <div class="crop-canvas-wrap" id="crop-wrap">
          <canvas id="crop-canvas"></canvas>
          <div class="crop-overlay" id="crop-overlay"></div>
        </div>
      </div>
      <div class="crop-actions">
        <button id="crop-analyze-btn" class="crop-btn crop-btn-primary" onclick="doCropAnalyze()">🔬 Analysieren (Plant.id)</button>
        <button class="crop-btn crop-btn-secondary" onclick="closeCropModal()">Abbrechen</button>
        <button class="crop-btn crop-btn-secondary" onclick="cropClearSelection()" style="font-size:11px">Auswahl aufheben</button>
      </div>
      <div id="crop-status" style="font-size:12px;color:#888;min-height:18px"></div>
    </div>`;
  document.body.appendChild(cropModal);

  cropCanvas = cropModal.querySelector('#crop-canvas');
  cropOverlay = cropModal.querySelector('#crop-overlay');
  cropCtx = cropCanvas.getContext('2d');

  cropCanvas.addEventListener('mousedown', e => {
    const r = cropCanvas.getBoundingClientRect();
    cropStart = { x: e.clientX - r.left, y: e.clientY - r.top };
    cropRect = null;
    cropOverlay.style.display = 'none';
  });
  cropCanvas.addEventListener('mousemove', e => {
    if (!cropStart) return;
    const r = cropCanvas.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const rx = Math.min(cropStart.x, x), ry = Math.min(cropStart.y, y);
    const rw = Math.abs(x - cropStart.x), rh = Math.abs(y - cropStart.y);
    cropOverlay.style.display = 'block';
    cropOverlay.style.left = rx + 'px'; cropOverlay.style.top = ry + 'px';
    cropOverlay.style.width = rw + 'px'; cropOverlay.style.height = rh + 'px';
    cropRect = { x: rx, y: ry, w: rw, h: rh };
  });
  cropCanvas.addEventListener('mouseup', () => { cropStart = null; });
  cropModal.addEventListener('click', e => { if (e.target === cropModal) closeCropModal(); });
}

function cropClearSelection() {
  cropRect = null;
  if (cropOverlay) cropOverlay.style.display = 'none';
}

function fitZoom() {
  if (!cropCanvas || !cropCanvas.width) return;
  const scroll = cropModal.querySelector('.crop-canvas-scroll');
  if (!scroll) return;
  const availW = scroll.clientWidth - 4;
  const availH = scroll.clientHeight - 4;
  const z = Math.min(availW / cropCanvas.width, availH / cropCanvas.height, 1.0);
  setCropZoom(z);
}

function loadImageOntoCanvas(src, label, isCrossOrigin) {
  const statusEl = cropModal.querySelector('#crop-status');
  statusEl.textContent = 'Bild wird geladen...';
  if (label) cropModal.querySelector('#crop-filename').textContent = label;
  cropCanvas.width = 10; cropCanvas.height = 10; // Reset
  cropRect = null;
  if (cropOverlay) cropOverlay.style.display = 'none';

  const img = new Image();
  if (isCrossOrigin) img.crossOrigin = 'anonymous';
  img.onload = () => {
    // Canvas auf native Auflösung zeichnen (max 1920px breit für Performance)
    const maxNative = 1920;
    const scale = img.naturalWidth > maxNative ? maxNative / img.naturalWidth : 1;
    cropCanvas.width  = Math.floor(img.naturalWidth  * scale);
    cropCanvas.height = Math.floor(img.naturalHeight * scale);
    cropCtx.drawImage(img, 0, 0, cropCanvas.width, cropCanvas.height);
    // Zoom zurücksetzen und Fit berechnen
    cropZoom = 1.0;
    fitZoom();
    statusEl.textContent = isCrossOrigin ? '' : 'Tipp: Ohne CORS-Header kann kein Ausschnitt exportiert werden — lade stattdessen ein Foto hoch.';
  };
  img.onerror = () => {
    statusEl.textContent = 'Bild konnte nicht geladen werden. Bitte Foto hochladen.';
  };
  img.src = src;
}

function openAnalysisModal(groupId, url) {
  cropGroupId = groupId;
  buildCropModal();
  cropModal.classList.add('open');
  const ts = new Date().toLocaleTimeString('de-DE');
  const cached = camCache[groupId];
  if (cached) {
    // Gecachtes ObjectURL ist same-origin → Canvas wird nicht tainted → toDataURL klappt
    loadImageOntoCanvas(cached, 'Kamera-Snapshot ' + ts, true);
  } else {
    // Noch kein Cache → über Proxy laden (same-origin)
    const proxyUrl = '/api/cam-proxy?url=' + encodeURIComponent(url) + '&t=' + Date.now();
    loadImageOntoCanvas(proxyUrl, 'Kamera-Snapshot ' + ts, true);
  }
}

function cropUploadFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      // data-URL from FileReader: same-origin, crossOrigin=true so toDataURL works
      loadImageOntoCanvas(ev.target.result, file.name, true);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function closeCropModal() {
  if (cropModal) cropModal.classList.remove('open');
}

// Tracks which group panels are currently expanded (survives SSE re-renders)
const _plantPanelOpen = new Set();

async function doCropAnalyze() {
  const snapshotGroupId = cropGroupId; // snapshot before first await (global may change)
  const statusEl = cropModal.querySelector('#crop-status');
  statusEl.textContent = '⏳ Analyse läuft...';
  cropModal.querySelector('#crop-analyze-btn').disabled = true;

  let base64;
  try {
    const offscreen = document.createElement('canvas');
    if (cropRect && cropRect.w > 10 && cropRect.h > 10) {
      // cropRect ist in CSS-Pixeln → in Canvas-Pixel umrechnen
      const sx = Math.round(cropRect.x / cropZoom), sy = Math.round(cropRect.y / cropZoom);
      const sw = Math.round(cropRect.w / cropZoom), sh = Math.round(cropRect.h / cropZoom);
      offscreen.width = sw; offscreen.height = sh;
      offscreen.getContext('2d').drawImage(cropCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
    } else {
      offscreen.width = cropCanvas.width; offscreen.height = cropCanvas.height;
      offscreen.getContext('2d').drawImage(cropCanvas, 0, 0);
    }
    base64 = offscreen.toDataURL('image/jpeg', 0.85);
  } catch(e) {
    const isCors = String(e).toLowerCase().includes('security') || String(e).toLowerCase().includes('taint');
    statusEl.textContent = isCors
      ? '⚠ CORS-Fehler: Bitte Foto hochladen (📂 Anderes Bild laden).'
      : '⚠ Fehler: ' + e;
    cropModal.querySelector('#crop-analyze-btn').disabled = false;
    return;
  }

  try {
    const resp = await fetch('/api/plant-analysis', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64 }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    closeCropModal();
    await addAnalysisToHistory(snapshotGroupId, data);
    _plantPanelOpen.add(snapshotGroupId);
    renderPlantResult(snapshotGroupId);
  } catch(e) {
    statusEl.textContent = '⚠ Netzwerkfehler: ' + e;
  }
  cropModal.querySelector('#crop-analyze-btn').disabled = false;
}

// ============================================================
// Analyse-Historie (ioBroker DB via /api/analyses/:groupId)
// ============================================================
const HISTORY_MAX_REGULAR = 10; // normale (nicht gestirnte) Einträge
const _analysisCache = new Map(); // groupId → AnalysisEntry[]

async function loadHistoryAsync(groupId) {
  if (_analysisCache.has(groupId)) return _analysisCache.get(groupId);
  try {
    const r = await fetch(`/api/analyses/${groupId}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const list = await r.json();
    _analysisCache.set(groupId, Array.isArray(list) ? list : []);
  } catch { _analysisCache.set(groupId, []); }
  return _analysisCache.get(groupId);
}

async function saveHistoryAsync(groupId, list) {
  _analysisCache.set(groupId, list);
  try {
    const r = await fetch(`/api/analyses/${groupId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(list),
    });
    if (!r.ok) console.warn('saveHistoryAsync: HTTP', r.status, 'für', groupId);
  } catch { /* ignore */ }
}

async function addAnalysisToHistory(groupId, data) {
  const ts = Date.now();
  const groupName = (window._dashState?.groups?.find(g => g.id === groupId)?.name) || groupId;
  const entry = { id: ts, groupId, groupName, ts, data, starred: false };
  let list = await loadHistoryAsync(groupId);
  list = [entry, ...list];
  const starred = list.filter(e => e.starred);
  const regular = list.filter(e => !e.starred).slice(0, HISTORY_MAX_REGULAR);
  list = [...starred, ...regular].sort((a, b) => b.ts - a.ts);
  await saveHistoryAsync(groupId, list);
}

async function toggleStar(entryId, groupId) {
  let list = await loadHistoryAsync(groupId);
  const entry = list.find(e => e.id === entryId);
  if (!entry) return;
  entry.starred = !entry.starred;
  const starred = list.filter(e => e.starred);
  const regular = list.filter(e => !e.starred).slice(0, HISTORY_MAX_REGULAR);
  list = [...starred, ...regular].sort((a, b) => b.ts - a.ts);
  await saveHistoryAsync(groupId, list);
  document.querySelectorAll('[data-history-group]').forEach(el => {
    renderPlantResult(el.dataset.historyGroup);
  });
}

async function deleteHistoryEntry(entryId, groupId) {
  let list = (await loadHistoryAsync(groupId)).filter(e => e.id !== entryId);
  await saveHistoryAsync(groupId, list);
  document.querySelectorAll('[data-history-group]').forEach(el => {
    renderPlantResult(el.dataset.historyGroup);
  });
}

  'underwatering': 'Wassermangel',
  'leaf blight': 'Blattfäule',
  'leaf spot': 'Blattflecken',
  'rust': 'Rost (Pilzkrankheit)',
  'fusarium': 'Fusarium-Welke',
  'pythium': 'Pythium-Fäule',
  'bacterial leaf spot': 'Bakterielle Blattflecken',
  'mosaic virus': 'Mosaikvirus',
  'healthy': 'Gesund',
};
function translateDisease(name) {
  if (!name) return '–';
  const lower = name.toLowerCase();
  for (const [en, de] of Object.entries(DISEASE_NAMES)) {
    if (lower.includes(en)) return de;
  }
  return name; // Originalname wenn keine Übersetzung
}

function buildResultHtml(data, compact) {
  if (data.error) {
    return `<div style="color:#d32f2f;font-size:12px">⚠ ${esc(data.error)}</div>`;
  }
  const health = data.result?.is_healthy;
  const diseases = data.result?.disease?.suggestions ?? [];
  const healthProb = Math.round((health?.probability ?? 0) * 100);
  const isHealthy = health?.binary === true || healthProb > 85;

  // Nur echte Probleme (>15%) anzeigen
  const realProblems = diseases.filter(d => (d.probability ?? 0) > 0.15);

  if (compact) {
    if (isHealthy) {
      return `<span style="color:#4caf50;font-weight:600">✓ Gesund</span> <span style="font-size:11px;color:#888">(${healthProb}%)</span>`;
    }
    const top = realProblems[0] ?? diseases[0];
    const pct = Math.round((top?.probability ?? 0) * 100);
    return `<span style="color:#f44336;font-weight:600">⚠ Problem</span> <span style="font-size:11px;color:#888">– ${esc(translateDisease(top?.name))} (${pct}%)</span>`;
  }

  // Vollansicht
  let html = '';
  if (isHealthy) {
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="color:#4caf50;font-weight:600;font-size:14px">✓ Pflanze gesund</span>
      <span style="font-size:11px;color:#888">Konfidenz: ${healthProb}%</span>
    </div>`;
    if (realProblems.length > 0) {
      html += `<div style="font-size:11px;color:#888;margin-bottom:4px">Schwache Hinweise (kein Handlungsbedarf):</div>`;
      realProblems.slice(0, 3).forEach(d => {
        const pct = Math.round((d.probability ?? 0) * 100);
        html += `<div class="plant-disease-row">
          <span style="flex:0 0 38px;font-size:11px;color:#aaa">${pct}%</span>
          <div class="plant-conf-bar"><div class="plant-conf-fill low" style="width:${pct}%"></div></div>
          <span style="font-size:12px;flex:1;color:#aaa">${esc(translateDisease(d.name))}</span>
        </div>`;
      });
    } else {
      html += `<div style="font-size:12px;color:#666">Keine Auffälligkeiten erkannt.</div>`;
    }
  } else {
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="color:#f44336;font-weight:600;font-size:14px">⚠ Probleme erkannt</span>
      <span style="font-size:11px;color:#888">Gesundheitswahrscheinlichkeit: ${healthProb}%</span>
    </div>`;
    const showList = realProblems.length > 0 ? realProblems : diseases.slice(0, 3);
    showList.slice(0, 5).forEach(d => {
      const pct = Math.round((d.probability ?? 0) * 100);
      const cls = pct >= 60 ? '' : pct >= 35 ? 'medium' : 'low';
      html += `<div class="plant-disease-row">
        <span style="flex:0 0 38px;font-size:11px;color:#888">${pct}%</span>
        <div class="plant-conf-bar"><div class="plant-conf-fill ${cls}" style="width:${pct}%"></div></div>
        <span style="font-size:12px;flex:1">${esc(translateDisease(d.name))}</span>
      </div>`;
    });
  }
  return html;
}

// Rendert das neueste Ergebnis + History-Liste für eine Gruppe in den DOM.
// Wird nach jedem Analyse-Abschluss UND nach jedem SSE-Re-render aufgerufen.
function renderPlantResult(groupId) {
  const container = document.getElementById('plant-result-' + groupId);
  if (!container) return;
  const list = (_analysisCache.get(groupId) || []);
  if (list.length === 0) { container.style.display = 'none'; return; }

  const latest = list[0];
  const starred = list.filter(e => e.starred).length;
  const dt = new Date(latest.ts).toLocaleString('de-DE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  const isOpen = _plantPanelOpen.has(groupId);

  const historyRows = list.map((e, idx) => {
    const edt = new Date(e.ts).toLocaleString('de-DE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    const starIcon = e.starred ? '⭐' : '☆';
    const label = idx === 0 ? '<span style="font-size:10px;background:#e8f5e9;color:#2e7d32;border-radius:3px;padding:1px 5px;margin-left:4px">NEU</span>' : '';
    return `<div class="analysis-entry ${e.starred ? 'analysis-entry-starred' : ''}">
      <span class="analysis-entry-star" onclick="toggleStar(${+e.id}, '${escAttr(e.groupId)}')" title="${e.starred ? 'Stern entfernen' : 'Als wichtig markieren'}">${starIcon}</span>
      <div class="analysis-entry-body">
        <div class="analysis-entry-ts">${edt}${label}</div>
        <div>${buildResultHtml(e.data, true)}</div>
      </div>
      <span onclick="deleteHistoryEntry(${+e.id}, '${escAttr(e.groupId)}')" style="cursor:pointer;color:#aaa;font-size:13px;flex-shrink:0" title="Loeschen">✕</span>
    </div>`;
  }).join('');

  container.dataset.historyGroup = groupId;
  container.innerHTML = `
    <span class="plant-result-toggle" onclick="togglePlantPanel('${escAttr(groupId)}')">
      🔬 ${list.length} Analyse${list.length !== 1 ? 'n' : ''}${starred ? ' · ' + starred + ' ⭐' : ''} · ${dt} ${isOpen ? '▲' : '▼'}
    </span>
    <div class="plant-result-panel" style="display:${isOpen ? 'block' : 'none'}">
      <div class="plant-result-title">Plant.id · ${dt}</div>
      <div>${buildResultHtml(latest.data, false)}</div>
      <div class="analysis-history-title" onclick="toggleHistoryList(this)" style="margin-top:10px">
        📋 Verlauf (${list.length} Analyse${list.length !== 1 ? 'n' : ''}, ${starred} ⭐)
        <span style="font-size:11px;color:#aaa">▼ ausklappen</span>
      </div>
      <div class="analysis-history-list" style="display:none;flex-direction:column;gap:5px">${historyRows}</div>
    </div>`;
  container.style.display = 'block';
}

function togglePlantPanel(groupId) {
  if (_plantPanelOpen.has(groupId)) _plantPanelOpen.delete(groupId);
  else _plantPanelOpen.add(groupId);
  renderPlantResult(groupId);
}

function toggleHistoryList(titleEl) {
  const list = titleEl.nextElementSibling;
  if (!list) return;
  const open = list.style.display !== 'none';
  list.style.display = open ? 'none' : 'flex';
  const arrow = titleEl.querySelector('span');
  if (arrow) arrow.textContent = open ? '▼ ausklappen' : '▲ einklappen';
}

// Nach SSE-Re-render: alle Gruppen mit History neu rendern
async function restorePlantResults() {
  if (!window._dashState?.groups) return;
  for (const g of window._dashState.groups) {
    await loadHistoryAsync(g.id);
    renderPlantResult(g.id);
  }
}

// State-Referenz für Gruppenname-Lookup
window._dashState = null;

// Crop-Modal schließen mit Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCropModal(); });
</script>
