<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GrowManager – Live Dashboard</title>
<style>
  :root {
    --green: #2e7d32; --green-light: #4caf50; --green-dark: #1b5e20;
    --bg: #121212; --surface: #1e1e1e; --surface2: #2a2a2a; --border: #333;
    --text: #e0e0e0; --text-dim: #888;
    --red: #ef5350; --orange: #ff9800; --yellow: #fbc02d; --blue: #42a5f5;
    --full: #4caf50; --limited: #fbc02d; --fallback: #ff9800;
    --monitor: #42a5f5; --safe: #9e9e9e; --fault: #ef5350;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--green-dark); padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--green);
  }
  .header-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .header-status { display: flex; align-items: center; gap: 16px; font-size: 13px; }
  .conn-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); display: inline-block; }
  .conn-dot.connected { background: var(--green-light); box-shadow: 0 0 6px var(--green-light); }
  .last-update { color: var(--text-dim); font-size: 12px; }

  .alarm-banner {
    background: rgba(239,83,80,0.15); border-left: 4px solid var(--red);
    padding: 10px 20px; font-size: 13px; display: none;
  }
  .alarm-banner.visible { display: flex; align-items: center; gap: 12px; }

  .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-chip .label { color: var(--text-dim); }
  .stat-chip .value { font-weight: 700; font-size: 15px; }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .group-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: border-color 0.3s;
  }
  .group-card:hover { border-color: var(--green); }

  .card-header {
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .health-badge {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .climate-row { display: flex; gap: 0; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .climate-val { flex: 1; text-align: center; border-right: 1px solid var(--border); }
  .climate-val:last-child { border-right: none; }
  .climate-num { font-size: 24px; font-weight: 700; color: var(--green-light); }
  .climate-num.null-val { color: var(--text-dim); font-size: 18px; }
  .climate-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; }
  .climate-target { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .climate-target.ok { color: var(--green-light); }
  .climate-target.warn { color: var(--yellow); }

  .meta-row {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 16px;
    font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .meta-tag { background: var(--surface2); padding: 2px 8px; border-radius: 3px; }
  .meta-tag.day { color: #ffd54f; }
  .meta-tag.night { color: #90caf9; }
  .meta-tag.mode { color: var(--blue); }
  .meta-tag.phase { color: var(--green-light); }

  /* Monitor-Sensor Info Icon */
  .monitor-info {
    position: relative; cursor: help;
    background: rgba(66,165,245,0.15); border: 1px solid var(--blue);
    border-radius: 3px; padding: 2px 7px; color: var(--blue); font-size: 11px;
  }
  .monitor-info:hover .monitor-tooltip {
    display: block;
  }
  .monitor-tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #1a2a3a; border: 1px solid var(--blue); border-radius: 6px;
    padding: 8px 12px; font-size: 12px; color: var(--text); white-space: nowrap;
    z-index: 50; margin-bottom: 6px; min-width: 160px; text-align: left;
  }
  .monitor-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: var(--blue);
  }

  /* Actuators */
  .actuators { padding: 10px 16px; }
  .act-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .actuator-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .actuator-row:last-child { border-bottom: none; }
  .act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .act-dot.on { background: var(--green-light); box-shadow: 0 0 5px var(--green-light); }
  .act-dot.off { background: var(--text-dim); }
  .act-name { flex: 1; }
  .act-state { font-weight: 600; font-size: 12px; }
  .act-state.on { color: var(--green-light); }
  .act-state.off { color: var(--text-dim); }
  .act-percent { font-size: 11px; color: var(--blue); }
  .act-override-badge {
    font-size: 10px; color: var(--orange); background: rgba(255,152,0,0.1);
    border: 1px solid var(--orange); border-radius: 3px; padding: 1px 5px;
  }

  /* Toggle button */
  .act-toggle {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); cursor: pointer; font-size: 11px;
    padding: 2px 8px; transition: all 0.2s; flex-shrink: 0;
  }
  .act-toggle:hover { border-color: var(--green-light); color: var(--green-light); }
  .act-toggle.on-btn:hover { border-color: var(--green-light); color: var(--green-light); }
  .act-toggle.off-btn:hover { border-color: var(--red); color: var(--red); }

  .percent-bar-wrap { flex: 1; background: var(--surface2); border-radius: 2px; height: 4px; max-width: 80px; }
  .percent-bar-fill { height: 100%; border-radius: 2px; background: var(--green-light); transition: width 0.5s; }

  /* Alarms */
  .card-alarms { padding: 8px 16px; }
  .card-alarm { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
  .sev-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Irrigation */
  .irrig-badge {
    margin: 0 16px 8px; background: rgba(66,165,245,0.15);
    border: 1px solid var(--blue); border-radius: 4px;
    padding: 4px 10px; font-size: 12px; color: var(--blue); display: none;
  }
  .irrig-badge.running { display: block; }

  /* Camera */
  .card-camera {
    margin: 0 16px 12px; border-radius: 6px; overflow: hidden;
    border: 1px solid var(--border); position: relative;
  }
  .card-camera img {
    width: 100%; display: block; max-height: 200px; object-fit: cover;
  }
  .card-camera-label {
    position: absolute; top: 6px; left: 6px;
    background: rgba(0,0,0,0.6); border-radius: 3px;
    font-size: 11px; color: var(--text-dim); padding: 2px 6px;
  }

  /* Empty */
  .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state h2 { color: var(--text); margin-bottom: 8px; }

  /* Reconnect overlay */
  .reconnect-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 16px;
  }
  .reconnect-overlay.visible { display: flex; }
  .reconnect-overlay p { font-size: 18px; }

  /* PIN Modal */
  .pin-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 200;
  }
  .pin-modal.visible { display: flex; }
  .pin-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 32px; min-width: 280px; text-align: center;
  }
  .pin-box h3 { margin-bottom: 6px; }
  .pin-box p { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }
  .pin-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 20px; letter-spacing: 6px;
    padding: 10px; text-align: center; outline: none;
  }
  .pin-input:focus { border-color: var(--green-light); }
  .pin-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 20px; }
  .pin-buttons { display: flex; gap: 10px; margin-top: 16px; }
  .pin-btn {
    flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 600;
  }
  .pin-btn.confirm { background: var(--green); color: #fff; }
  .pin-btn.cancel { background: var(--surface2); color: var(--text); }

  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--green-light);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🌿 GrowManager</div>
  <div class="header-status">
    <span class="last-update" id="lastUpdate">–</span>
    <span id="connDot" class="conn-dot"></span>
    <span id="connLabel">Verbinde…</span>
  </div>
</div>

<div class="alarm-banner" id="alarmBanner">
  <span>⚠</span><span id="alarmBannerText"></span>
</div>

<div class="main">
  <div class="stats-bar" id="statsBar"></div>
  <div class="groups-grid" id="groupsGrid">
    <div class="empty-state">
      <div class="spinner"></div>
      <p style="margin-top:20px;color:var(--text-dim)">Verbinde mit Adapter…</p>
    </div>
  </div>
</div>

<div class="reconnect-overlay" id="reconnectOverlay">
  <div class="spinner"></div>
  <p>Verbindung unterbrochen – verbinde neu…</p>
</div>

<!-- PIN Dialog -->
<div class="pin-modal" id="pinModal">
  <div class="pin-box">
    <h3>🔒 PIN eingeben</h3>
    <p id="pinLabel">Manuelle Steuerung</p>
    <input class="pin-input" id="pinInput" type="password" maxlength="8" placeholder="····" />
    <div class="pin-error" id="pinError"></div>
    <div class="pin-buttons">
      <button class="pin-btn cancel" id="pinCancel">Abbrechen</button>
      <button class="pin-btn confirm" id="pinConfirm">OK</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// GrowManager Live Dashboard
// ============================================================

const HEALTH_COLORS = {
  FULL: 'var(--full)', LIMITED: 'var(--limited)', FALLBACK: 'var(--fallback)',
  MONITOR_ONLY: 'var(--monitor)', SAFE: 'var(--safe)', FAULT: 'var(--fault)',
};
const SEV_COLORS = { critical: 'var(--red)', fault: 'var(--orange)', warning: 'var(--yellow)', info: 'var(--blue)' };
const TYPE_ICONS = {
  light: '💡', exhaustFan: '🌀', supplyFan: '🌬️', circulationFan: '🔄',
  heating: '🔥', cooling: '❄️', humidifier: '💧', dehumidifier: '🌵',
  irrigation: '🚿', co2Valve: '💨', damper: '🎚️', custom: '⚙️',
};
const PHASE_LABELS = { seedling: 'Keimling', growth: 'Wachstum', bloom: 'Blüte', drying: 'Trocknung', custom: 'Individuell' };
const MODE_LABELS = {
  monitorOnly: 'Nur Überwachung', temperature: 'Temperatur-Regelung',
  humidity: 'Feuchte-Regelung', vpd: 'VPD-Regelung', combined: 'Kombiniert',
  schedule: 'Zeitplan', manual: 'Manuell', maintenance: 'Wartung', off: 'Aus',
};

let eventSource = null;
let reconnectTimer = null;
let connected = false;
let currentState = null;

// PIN-Dialog
let pinResolve = null;
const pinModal = document.getElementById('pinModal');
const pinInput = document.getElementById('pinInput');
const pinError = document.getElementById('pinError');
const pinLabel = document.getElementById('pinLabel');

document.getElementById('pinCancel').onclick = () => resolvePinDialog(null);
document.getElementById('pinConfirm').onclick = () => resolvePinDialog(pinInput.value);
pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') resolvePinDialog(pinInput.value); });

function showPinDialog(label) {
  return new Promise(resolve => {
    pinResolve = resolve;
    pinLabel.textContent = label;
    pinInput.value = '';
    pinError.textContent = '';
    pinModal.classList.add('visible');
    setTimeout(() => pinInput.focus(), 50);
  });
}
function resolvePinDialog(pin) {
  pinModal.classList.remove('visible');
  if (pinResolve) { pinResolve(pin); pinResolve = null; }
}

async function sendControl(groupId, actuatorId, command, label) {
  // Check if PIN is configured — we detect this by trying without PIN first;
  // server returns 403 if PIN needed but wrong. We always show the dialog
  // if the server ever returned 403.
  let pin = '';
  if (window._pinRequired) {
    pin = await showPinDialog(label);
    if (pin === null) return; // cancelled
  }

  try {
    const r = await fetch('/api/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ groupId, actuatorId, command, durationMinutes: 60, pin }),
    });
    if (r.status === 403) {
      window._pinRequired = true;
      pinError.textContent = pin ? 'Falsche PIN' : '';
      pin = await showPinDialog(label);
      if (pin === null) return;
      // Retry with PIN
      const r2 = await fetch('/api/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groupId, actuatorId, command, durationMinutes: 60, pin }),
      });
      if (r2.status === 403) {
        pinError.textContent = 'Falsche PIN';
        pinModal.classList.add('visible');
        return;
      }
    }
  } catch (e) {
    console.error('Control-Fehler:', e);
  }
}

function healthBadgeHtml(health) {
  const color = HEALTH_COLORS[health] ?? 'var(--safe)';
  return `<span class="health-badge" style="background:${color}22;color:${color};border:1px solid ${color}">${health}</span>`;
}

function tempDelta(val, target) {
  if (val === null || target === null) return '';
  const diff = val - target;
  const cls = Math.abs(diff) <= 1 ? 'ok' : 'warn';
  const sign = diff >= 0 ? '+' : '';
  return `<div class="climate-target ${cls}">Soll: ${target.toFixed(1)}° (${sign}${diff.toFixed(1)})</div>`;
}
function humDelta(val, target) {
  if (val === null || target === null) return '';
  const diff = val - target;
  const cls = Math.abs(diff) <= 5 ? 'ok' : 'warn';
  const sign = diff >= 0 ? '+' : '';
  return `<div class="climate-target ${cls}">Soll: ${target.toFixed(0)}% (${sign}${diff.toFixed(0)})</div>`;
}

function actuatorHtml(a, groupId, manualOverrides) {
  const isOn = a.command === true || (typeof a.command === 'number' && a.command > 0);
  const isPercent = typeof a.command === 'number' && a.command > 0;
  const pct = isPercent ? a.command : null;
  const icon = TYPE_ICONS[a.type] ?? '⚙️';
  const ov = manualOverrides && manualOverrides[a.id];
  const ovBadge = ov ? `<span class="act-override-badge" title="Manuell bis ${new Date(ov.until).toLocaleTimeString('de-DE')}">MANUELL</span>` : '';

  let rightSide = '';
  if (isPercent && pct !== null) {
    rightSide = `
      <span class="act-percent">${Math.round(pct)}%</span>
      <div class="percent-bar-wrap"><div class="percent-bar-fill" style="width:${pct}%"></div></div>
    `;
  } else {
    rightSide = `<span class="act-state ${isOn ? 'on' : 'off'}">${isOn ? 'EIN' : 'AUS'}</span>`;
  }

  const toggleOn = `<button class="act-toggle on-btn" onclick="sendControl('${groupId}','${a.id}',true,'${icon} ${a.name} einschalten')">EIN</button>`;
  const toggleOff = `<button class="act-toggle off-btn" onclick="sendControl('${groupId}','${a.id}',false,'${icon} ${a.name} ausschalten')">AUS</button>`;

  return `
    <div class="actuator-row">
      <div class="act-dot ${isOn ? 'on' : 'off'}"></div>
      <span class="act-name">${icon} ${a.name}</span>
      ${ovBadge}
      ${rightSide}
      ${toggleOn}${toggleOff}
    </div>
  `;
}

function groupCardHtml(g) {
  const healthColor = HEALTH_COLORS[g.health] ?? 'var(--safe)';
  const isDay = g.isDay;
  const dayNightTag = isDay
    ? '<span class="meta-tag day">☀ Tag</span>'
    : '<span class="meta-tag night">🌙 Nacht</span>';

  const phaseLabel = PHASE_LABELS[g.phase] ?? g.phase;
  const modeLabel = MODE_LABELS[g.mode] ?? g.mode;

  // Monitor-Sensor Info (nur wenn vorhanden)
  let monitorTag = '';
  if (g.monitorSensors && g.monitorSensors.length > 0) {
    const names = g.monitorSensors.join(', ');
    monitorTag = `
      <span class="monitor-info">ℹ Monitor (${g.monitorSensors.length})
        <div class="monitor-tooltip"><strong>Nur-Überwachung-Sensoren:</strong><br>${names.replace(/,/g,'<br>')}</div>
      </span>`;
  }

  const actHtml = g.actuators && g.actuators.length > 0
    ? `<div class="actuators"><div class="act-title">Aktoren</div>${g.actuators.map(a => actuatorHtml(a, g.id, g.manualOverrides)).join('')}</div>`
    : '';

  const alarmHtml = g.alarms && g.alarms.length > 0
    ? `<div class="card-alarms">${g.alarms.map(a => {
        const c = SEV_COLORS[a.severity] ?? 'var(--text-dim)';
        return `<div class="card-alarm"><div class="sev-dot" style="background:${c}"></div><span style="color:${c}">[${a.severity.toUpperCase()}]</span> ${a.code}: ${a.message}</div>`;
      }).join('')}</div>`
    : '';

  const irrigBadge = g.irrigationRunning
    ? '<div class="irrig-badge running">💧 Bewässerung aktiv</div>'
    : '<div class="irrig-badge"></div>';

  const soilHtml = g.soilMoisture !== null
    ? `<div class="climate-val">
        <div class="climate-num">${g.soilMoisture.toFixed(0)}<small style="font-size:14px;font-weight:400">%</small></div>
        <div class="climate-label">Boden</div>
      </div>`
    : '';

  const cameraHtml = g.cameraUrl
    ? `<div class="card-camera">
        <img src="${g.cameraUrl}?t=${Date.now()}" alt="Kamera" onerror="this.style.display='none'" />
        <span class="card-camera-label">📷 Kamera</span>
      </div>`
    : '';

  // VPD-Soll anzeigen
  let vpdTarget = '';
  if (g.setpointVpdMin !== null && g.setpointVpdMax !== null) {
    const inRange = g.vpd !== null && g.vpd >= g.setpointVpdMin && g.vpd <= g.setpointVpdMax;
    vpdTarget = `<div class="climate-target ${inRange ? 'ok' : 'warn'}">Soll: ${g.setpointVpdMin.toFixed(2)}–${g.setpointVpdMax.toFixed(2)}</div>`;
  }

  return `
    <div class="group-card" id="card-${g.id}">
      <div class="card-header">
        <div class="card-name">
          <div class="color-dot" style="background:${g.color}"></div>
          ${g.name}
        </div>
        ${healthBadgeHtml(g.health)}
      </div>
      <div class="climate-row">
        <div class="climate-val">
          <div class="climate-num ${g.temperature === null ? 'null-val' : ''}">${g.temperature !== null ? g.temperature.toFixed(1) + '°' : '–'}</div>
          <div class="climate-label">Temperatur</div>
          ${tempDelta(g.temperature, g.setpointTemp)}
        </div>
        <div class="climate-val">
          <div class="climate-num ${g.humidity === null ? 'null-val' : ''}">${g.humidity !== null ? g.humidity.toFixed(0) + '%' : '–'}</div>
          <div class="climate-label">Luftfeuchte</div>
          ${humDelta(g.humidity, g.setpointHumidity)}
        </div>
        <div class="climate-val">
          <div class="climate-num ${g.vpd === null ? 'null-val' : ''}">${g.vpd !== null ? g.vpd.toFixed(2) : '–'}</div>
          <div class="climate-label">VPD kPa</div>
          ${vpdTarget}
        </div>
        ${soilHtml}
      </div>
      <div class="meta-row">
        <span class="meta-tag phase">${phaseLabel}</span>
        <span class="meta-tag mode">${modeLabel}</span>
        ${dayNightTag}
        ${monitorTag}
        <span class="meta-tag" style="margin-left:auto">Q: ${g.sensorQuality}%</span>
      </div>
      ${cameraHtml}
      ${irrigBadge}
      ${actHtml}
      ${alarmHtml}
    </div>
  `;
}

function renderStats(state) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-chip">
      <span class="label">Adapter</span>
      <span class="value" style="color:${state.health === 'running' ? 'var(--green-light)' : 'var(--orange)'}">${state.health}</span>
    </div>
    <div class="stat-chip">
      <span class="label">Gruppen</span>
      <span class="value">${state.groups.length}</span>
    </div>
    <div class="stat-chip">
      <span class="label">Alarme</span>
      <span class="value" style="color:${state.activeAlarms > 0 ? 'var(--red)' : 'var(--green-light)'}">${state.activeAlarms}</span>
    </div>
    <div class="stat-chip">
      <span class="label">Version</span>
      <span class="value" style="color:var(--text-dim)">${state.adapterVersion}</span>
    </div>
  `;
}

function renderAlarmBanner(state) {
  const banner = document.getElementById('alarmBanner');
  if (state.activeAlarms > 0) {
    document.getElementById('alarmBannerText').textContent =
      `${state.activeAlarms} aktive${state.activeAlarms === 1 ? 'r' : ''} Alarm${state.activeAlarms !== 1 ? 'e' : ''}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function render(state) {
  currentState = state;
  renderStats(state);
  renderAlarmBanner(state);
  const grid = document.getElementById('groupsGrid');
  if (!state.groups || state.groups.length === 0) {
    grid.innerHTML = `<div class="empty-state"><h2>Keine Gruppen konfiguriert</h2><p>Lege Gruppen in der ioBroker Admin-Oberfläche an.</p></div>`;
    return;
  }
  grid.innerHTML = state.groups.map(groupCardHtml).join('');
}

function setConnected(val) {
  connected = val;
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  dot.className = 'conn-dot' + (val ? ' connected' : '');
  label.textContent = val ? 'Verbunden' : 'Getrennt';
  document.getElementById('reconnectOverlay').classList.toggle('visible', !val);
}

function updateTimestamp() {
  document.getElementById('lastUpdate').textContent = 'Zuletzt: ' + new Date().toLocaleTimeString('de-DE');
}

function connect() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  clearTimeout(reconnectTimer);
  eventSource = new EventSource('/api/events');
  eventSource.onopen = () => setConnected(true);
  eventSource.onmessage = (evt) => {
    try { const s = JSON.parse(evt.data); render(s); updateTimestamp(); if (!connected) setConnected(true); }
    catch (e) { console.error('Parse error', e); }
  };
  eventSource.onerror = () => {
    setConnected(false); eventSource.close(); eventSource = null;
    reconnectTimer = setTimeout(connect, 3000);
  };
}

connect();
setInterval(() => {
  if (!connected) {
    fetch('/api/state').then(r => r.json()).then(s => { render(s); updateTimestamp(); setConnected(true); }).catch(() => {});
  }
}, 15000);
</script>
</body>
</html>
