<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GrowManager – Live Dashboard</title>
<style>
  :root {
    --green: #2e7d32; --green-light: #4caf50; --green-dark: #1b5e20;
    --bg: #121212; --surface: #1e1e1e; --surface2: #2a2a2a; --border: #333;
    --text: #e0e0e0; --text-dim: #888;
    --red: #ef5350; --orange: #ff9800; --yellow: #fbc02d; --blue: #42a5f5; --purple: #ce93d8;
    --full: #4caf50; --limited: #fbc02d; --fallback: #ff9800;
    --monitor: #42a5f5; --safe: #9e9e9e; --fault: #ef5350;
    --warn: #ff9800; --accent: #4caf50; --muted: #666;
  }

  /* ---- Sortenwiki ---- */
  .wiki-btn {
    background: var(--green); border: none; color: #fff; cursor: pointer;
    border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px; transition: background 0.2s;
  }
  .wiki-btn:hover { background: var(--green-light); }

  .wiki-overlay {
    display: none; position: fixed; inset: 0; z-index: 9200;
    background: var(--bg); flex-direction: column;
  }
  .wiki-overlay.open { display: flex; }

  .wiki-topbar {
    background: var(--green-dark); padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 2px solid var(--green); flex-shrink: 0;
  }
  .wiki-topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
  .wiki-close-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 14px;
  }
  .wiki-close-btn:hover { background: rgba(255,255,255,0.25); }
  .wiki-add-btn {
    background: var(--green); border: none; color: #fff; cursor: pointer;
    border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .wiki-add-btn:hover { background: var(--green-light); }
  .wiki-search {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; border-radius: 6px; padding: 6px 12px; font-size: 13px; width: 220px;
  }
  .wiki-search::placeholder { color: rgba(255,255,255,0.5); }

  .wiki-body {
    display: flex; flex: 1; overflow: hidden;
  }

  /* Linke Spalte: Sortenliste */
  .wiki-list {
    width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
    overflow-y: auto; padding: 12px 8px;
  }
  .wiki-list-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
    border: 1px solid transparent; transition: all 0.15s;
  }
  .wiki-list-item:hover { background: var(--surface2); border-color: var(--border); }
  .wiki-list-item.active { background: rgba(46,125,50,0.2); border-color: var(--green); }
  .wiki-list-name { font-weight: 600; font-size: 14px; }
  .wiki-list-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .wiki-list-badges { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .wiki-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600;
  }
  .wiki-badge.sativa  { background: rgba(66,165,245,0.2); color: #42a5f5; }
  .wiki-badge.indica  { background: rgba(206,147,216,0.2); color: #ce93d8; }
  .wiki-badge.hybrid  { background: rgba(76,175,80,0.2);  color: #81c784; }
  .wiki-badge.easy    { background: rgba(76,175,80,0.2);  color: #81c784; }
  .wiki-badge.medium  { background: rgba(251,192,45,0.2); color: #fbc02d; }
  .wiki-badge.hard    { background: rgba(239,83,80,0.2);  color: #ef5350; }

  /* Rechte Seite: Detail / Formular */
  .wiki-detail {
    flex: 1; overflow-y: auto; padding: 24px 28px;
  }
  .wiki-empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); gap: 12px; font-size: 15px;
  }
  .wiki-detail-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 20px; gap: 12px;
  }
  .wiki-detail-name { font-size: 24px; font-weight: 700; }
  .wiki-detail-breeder { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .wiki-detail-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .wiki-edit-btn, .wiki-del-btn {
    border: none; cursor: pointer; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600;
  }
  .wiki-edit-btn { background: var(--surface2); color: var(--text); }
  .wiki-edit-btn:hover { background: var(--border); }
  .wiki-del-btn  { background: rgba(239,83,80,0.15); color: var(--red); }
  .wiki-del-btn:hover  { background: rgba(239,83,80,0.3); }

  .wiki-sections { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .wiki-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
  }
  .wiki-section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-dim); margin-bottom: 10px;
  }
  .wiki-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .wiki-row-label { color: var(--text-dim); }
  .wiki-row-val { font-weight: 600; }
  .wiki-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .wiki-tag {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 3px 9px; font-size: 12px;
  }
  .wiki-notes {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 13px; color: var(--text-dim); margin-top: 14px; line-height: 1.6;
  }

  /* Formular */
  .wiki-form { max-width: 700px; }
  .wiki-form-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .wiki-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .wiki-form-full { grid-column: 1 / -1; }
  .wiki-field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .wiki-field input, .wiki-field select, .wiki-field textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  .wiki-field input:focus, .wiki-field select:focus, .wiki-field textarea:focus {
    outline: none; border-color: var(--green);
  }
  .wiki-field textarea { resize: vertical; min-height: 70px; }
  .wiki-range-row { display: flex; align-items: center; gap: 8px; }
  .wiki-range-row input { flex: 1; }
  .wiki-range-sep { color: var(--text-dim); font-size: 13px; flex-shrink: 0; }
  .wiki-form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .wiki-save-btn {
    background: var(--green); border: none; color: #fff; cursor: pointer;
    border-radius: 6px; padding: 9px 20px; font-size: 14px; font-weight: 600;
  }
  .wiki-save-btn:hover { background: var(--green-light); }
  .wiki-cancel-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    cursor: pointer; border-radius: 6px; padding: 9px 16px; font-size: 14px;
  }
  .wiki-section-divider { grid-column: 1/-1; border: none; border-top: 1px solid var(--border); margin: 4px 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--green-dark); padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--green);
  }
  .header-title { font-size: 20px; font-weight: 700; }
  .header-status { display: flex; align-items: center; gap: 16px; font-size: 13px; }
  .conn-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); display: inline-block; }
  .conn-dot.connected { background: var(--green-light); box-shadow: 0 0 6px var(--green-light); }
  .last-update { color: var(--text-dim); font-size: 12px; }

  .alarm-banner {
    background: rgba(239,83,80,0.15); border-left: 4px solid var(--red);
    padding: 10px 20px; font-size: 13px; display: none;
  }
  .alarm-banner.visible { display: flex; align-items: center; gap: 12px; }

  .main { padding: 20px; max-width: 1400px; margin: 0 auto; }

  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-chip .label { color: var(--text-dim); }
  .stat-chip .value { font-weight: 700; font-size: 15px; }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ---- Group card ---- */
  .group-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: border-color 0.3s;
  }
  .group-card:hover { border-color: var(--green); }

  .card-header {
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .health-badge {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* ---- Aktive Geräte Icons ---- */
  .act-icons-row {
    display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px;
    border-bottom: 1px solid var(--border); align-items: center;
  }
  .act-icon-chip {
    position: relative;
    display: flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px; font-size: 12px;
    border: 1px solid transparent; cursor: default; transition: all 0.2s;
  }
  .act-icon-chip.on {
    background: rgba(76,175,80,0.15); border-color: var(--green-light); color: var(--green-light);
  }
  .act-icon-chip.on.heating { background: rgba(255,152,0,0.15); border-color: var(--orange); color: var(--orange); }
  .act-icon-chip.on.cooling { background: rgba(66,165,245,0.15); border-color: var(--blue); color: var(--blue); }
  .act-icon-chip.on.light { background: rgba(251,192,45,0.15); border-color: var(--yellow); color: var(--yellow); }
  .act-icon-chip.on.irrigation { background: rgba(66,165,245,0.2); border-color: #29b6f6; color: #29b6f6; }
  .act-icon-chip.off { opacity: 0.35; border-color: var(--border); color: var(--text-dim); }
  .act-icon-chip:hover .act-icon-tip { display: block; }
  .act-icon-tip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #222; border: 1px solid var(--border); border-radius: 5px;
    padding: 5px 10px; font-size: 11px; white-space: nowrap; z-index: 50; color: var(--text);
  }
  .act-icon-tip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: var(--border);
  }
  .act-icon-pulse {
    width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ---- Klimawerte ---- */
  .climate-row { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .climate-val {
    flex: 1; min-width: 80px; text-align: center; padding: 12px 6px;
    border-right: 1px solid var(--border); position: relative;
  }
  .climate-val:last-child { border-right: none; }
  .climate-val.controlled { background: rgba(76,175,80,0.05); }
  .climate-val.controlled::after {
    content: '●'; position: absolute; top: 5px; right: 6px;
    font-size: 7px; color: var(--green-light); opacity: 0.7;
  }
  .climate-num { font-size: 24px; font-weight: 700; color: var(--green-light); line-height: 1.1; }
  .climate-num.dim { font-size: 20px; color: var(--text-dim); }
  .climate-num.null-val { color: var(--text-dim); font-size: 18px; }
  .climate-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Sollwert Bereich */
  .setpoint-bar {
    margin: 4px 4px 0; height: 3px; border-radius: 2px;
    background: var(--border); position: relative; overflow: visible;
  }
  .setpoint-range {
    position: absolute; top: 0; height: 100%; border-radius: 2px;
    background: rgba(76,175,80,0.5);
  }
  .setpoint-marker {
    position: absolute; top: -3px; width: 3px; height: 9px;
    background: var(--green-light); border-radius: 1px; transform: translateX(-50%);
  }
  .setpoint-text {
    font-size: 10px; color: var(--text-dim); margin-top: 3px; white-space: nowrap;
  }
  .setpoint-text.ok { color: var(--green-light); }
  .setpoint-text.warn { color: var(--yellow); }
  .setpoint-text.fault { color: var(--red); }

  /* ---- Meta-Zeile ---- */
  .meta-row {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 16px;
    font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .meta-tag { background: var(--surface2); padding: 2px 8px; border-radius: 3px; }
  .meta-tag.day { color: #ffd54f; }
  .meta-tag.night { color: #90caf9; }
  .meta-tag.mode { color: var(--blue); }
  .meta-tag.phase { color: var(--green-light); }

  .monitor-info {
    position: relative; cursor: help;
    background: rgba(66,165,245,0.1); border: 1px solid var(--blue);
    border-radius: 3px; padding: 2px 7px; color: var(--blue); font-size: 11px;
  }
  .monitor-info:hover .monitor-tooltip { display: block; }
  .monitor-tooltip {
    display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #1a2a3a; border: 1px solid var(--blue); border-radius: 6px;
    padding: 8px 12px; font-size: 12px; color: var(--text); white-space: nowrap;
    z-index: 50; margin-bottom: 6px; min-width: 160px; text-align: left;
  }
  .monitor-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: var(--blue);
  }

  /* ---- Sensorqualität Tooltip ---- */
  .quality-badge {
    position: relative; cursor: help; margin-left: auto;
    border-radius: 3px; padding: 2px 7px; font-size: 11px;
  }
  .quality-badge:hover .quality-tooltip { display: block; }
  .quality-tooltip {
    display: none; position: absolute; bottom: 100%; right: 0;
    background: #1a2a3a; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 12px; color: var(--text); white-space: nowrap;
    z-index: 50; margin-bottom: 6px; min-width: 220px; text-align: left;
  }
  .quality-tooltip::after {
    content: ''; position: absolute; top: 100%; right: 14px;
    border: 6px solid transparent; border-top-color: var(--border);
  }
  .q-sensor-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
  .q-sensor-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .q-sensor-name { flex: 1; color: var(--text-dim); }
  .q-sensor-val { font-weight: 600; }
  .q-sensor-err { font-size: 10px; color: var(--orange); grid-column: 2 / -1; }

  /* ---- Voting Tooltip (Soll bei geteilten Aktoren) ---- */
  .act-soll-voting { display: inline-flex; align-items: center; gap: 4px; cursor: help; }
  .voting-tooltip-data { display: none; } /* nur Datenspeicher, wird per JS in Fixed-Overlay gerendert */
  #vote-tooltip-fixed {
    display: none; position: fixed; z-index: 9999; pointer-events: none;
    background: #1a2a3a; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 12px; color: var(--text); white-space: nowrap;
    min-width: 200px; text-align: left; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .v-vote-row { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
  .v-vote-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .v-vote-name { color: var(--text); font-weight: 600; }
  .v-vote-val { font-weight: 600; }
  .v-vote-reason { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  /* ---- Pending-Indikator Soll≠Ist ---- */
  .act-pending { font-size: 12px; opacity: 0.8; cursor: help; }
  .act-label-dim { font-size: 10px; color: var(--text-dim); }

  /* ---- Aktoren Detail ---- */
  .actuators { padding: 10px 16px; }
  .act-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .actuator-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .actuator-row:last-child { border-bottom: none; }
  .act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .act-dot.on { background: var(--green-light); box-shadow: 0 0 5px var(--green-light); }
  .act-dot.off { background: var(--text-dim); }
  .act-name { flex: 1; }
  .act-state { font-weight: 600; font-size: 12px; }
  .act-state.on { color: var(--green-light); }
  .act-state.off { color: var(--text-dim); }
  .act-percent { font-size: 11px; color: var(--blue); }
  .act-override-badge {
    font-size: 10px; color: var(--orange); background: rgba(255,152,0,0.1);
    border: 1px solid var(--orange); border-radius: 3px; padding: 1px 5px;
  }
  .act-override-badge.clickable { cursor: pointer; }
  .act-override-badge.clickable:hover { background: rgba(255,152,0,0.25); }
  .act-mode-badge {
    font-size: 10px; color: var(--green-light); background: rgba(102,187,106,0.1);
    border: 1px solid var(--green-light); border-radius: 3px; padding: 1px 5px;
  }
  .act-feedback { font-size: 11px; color: var(--text-dim); margin-left: 4px; }
  .trend-hint { padding: 20px; color: var(--text-dim); font-size: 12px; line-height: 1.6; }
  .diag-hints { display: flex; flex-direction: column; gap: 4px; margin: 6px 0 2px; }
  .diag-hint-row { display: flex; align-items: flex-start; gap: 6px; padding: 6px 10px;
    border-radius: 6px; font-size: 11.5px; line-height: 1.5; }
  .diag-hint-row.warn { background: rgba(255,152,0,0.08); border-left: 3px solid var(--orange); }
  .diag-hint-row.info { background: rgba(33,150,243,0.08); border-left: 3px solid var(--blue); }
  .diag-hint-icon { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
  .diag-hint-text { color: var(--text); }
  .act-unreachable { opacity: 0.6; }
  .act-health-err  { font-size: 14px; margin-right: 4px; }
  .act-health-warn { font-size: 12px; color: var(--orange); margin-right: 4px; }
  .chip-unreachable { opacity: 0.5; border: 1px solid var(--orange) !important; }
  .act-chip-err { position: absolute; top: -4px; right: -4px; background: var(--orange);
    color: #000; font-size: 9px; font-weight: bold; border-radius: 50%;
    width: 13px; height: 13px; display: flex; align-items: center; justify-content: center; }
  .act-icon-chip { position: relative; }
  .act-shared-badge { font-size: 10px; color: var(--blue); background: rgba(33,150,243,0.1); border: 1px solid var(--blue); border-radius: 3px; padding: 1px 5px; margin-right: 4px; }
  .act-shared-from-badge { font-size: 10px; color: var(--blue); background: rgba(33,150,243,0.08); border: 1px solid rgba(33,150,243,0.4); border-radius: 3px; padding: 1px 6px; cursor: help; }
  .act-shared-extern { opacity: 0.85; background: rgba(33,150,243,0.04); border-radius: 4px; }
  .act-soll-label { font-size: 10px; color: var(--text-dim); margin-left: 4px; }
  .act-ist-label  { font-size: 10px; color: var(--text-dim); margin-left: 8px; }
  .act-countdown { font-size: 10px; color: var(--orange); background: rgba(255,152,0,0.1); border: 1px solid rgba(255,152,0,0.35); border-radius: 3px; padding: 1px 6px; margin-left: 6px; font-variant-numeric: tabular-nums; cursor: help; }
  .act-power { font-size: 10px; color: var(--green-light); background: rgba(102,187,106,0.1); border: 1px solid rgba(102,187,106,0.35); border-radius: 3px; padding: 1px 6px; margin-left: 6px; font-variant-numeric: tabular-nums; }
  .act-power-rated { color: var(--text-dim); background: rgba(128,128,128,0.08); border-color: rgba(128,128,128,0.25); }
  .act-manual-lock { font-size: 10px; color: var(--yellow); background: rgba(251,192,45,0.1); border: 1px solid rgba(251,192,45,0.35); border-radius: 3px; padding: 1px 6px; margin-left: 6px; }
  .act-toggle {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); cursor: pointer; font-size: 11px;
    padding: 2px 7px; transition: all 0.2s; flex-shrink: 0;
  }

</style>

<script>
// ============================================================
// GrowManager Live Dashboard
// ============================================================

// HTML-Escaping für Textnodes und Attribute
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
// JS-String-Escaping für onclick-Attribute (Werte in einfachen Anführungszeichen)
function escAttr(s) {
  return String(s ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

const HEALTH_COLORS = {
  FULL: 'var(--full)', LIMITED: 'var(--limited)', FALLBACK: 'var(--fallback)',
  MONITOR_ONLY: 'var(--monitor)', SAFE: 'var(--safe)', FAULT: 'var(--fault)',
};
const SEV_COLORS = { critical: 'var(--red)', fault: 'var(--orange)', warning: 'var(--yellow)', info: 'var(--blue)' };

// Aktor-Typen: Icon, Label, CSS-Klasse für Farbe
const ACT_TYPE = {
  light:          { icon: '💡', label: 'Licht',        cls: 'light' },
  exhaustFan:     { icon: '🌀', label: 'Abluft',       cls: 'fan' },
  supplyFan:      { icon: '🌬️', label: 'Zuluft',       cls: 'fan' },
  circulationFan: { icon: '🔄', label: 'Umluft',       cls: 'fan' },
  heating:        { icon: '🔥', label: 'Heizung',      cls: 'heating' },
  cooling:        { icon: '❄️', label: 'Kühlung',      cls: 'cooling' },
  humidifier:     { icon: '💧', label: 'Befeuchter',   cls: '' },
  dehumidifier:   { icon: '🌵', label: 'Entfeuchter',  cls: '' },
  irrigation:     { icon: '🚿', label: 'Pumpe',        cls: 'irrigation' },
  co2Valve:       { icon: '💨', label: 'CO₂',          cls: '' },
  damper:         { icon: '🎚️', label: 'Klappe',       cls: '' },
  custom:         { icon: '⚙️', label: 'Gerät',        cls: '' },
};

const PHASE_LABELS = { seedling:'Keimling', growth:'Wachstum', bloom:'Blüte', drying:'Trocknung', custom:'Individuell' };
const camUrls = {};      // groupId -> snapshotUrl, populated during render
const camCache = {};     // groupId -> last-good objectURL (blob:// from cam-proxy)
const camInFlight = {};  // groupId -> true wenn ein Refresh gerade läuft (Race-Condition-Schutz)
const MODE_LABELS = {
  monitorOnly:'Nur Überwachung', temperature:'Temperatur', humidity:'Feuchte',
  vpd:'VPD', combined:'Kombiniert', schedule:'Zeitplan', manual:'Manuell',
  maintenance:'Wartung', off:'Aus',
};

// Welche Klimawerte welcher Modus regelt
const MODE_CONTROLS = {
  temperature: ['temp'],
  humidity:    ['hum'],
  vpd:         ['vpd'],
  combined:    ['temp','hum','vpd','soil','co2'],
  schedule:    ['temp','hum','vpd','soil','co2'],
  monitorOnly: [],
  manual:      [],
  off:         [],
};

let eventSource = null, reconnectTimer = null, connected = false;
let pinResolve = null;
const pinModal = document.getElementById('pinModal');
const pinInput = document.getElementById('pinInput');
const pinError = document.getElementById('pinError');
const pinLabel = document.getElementById('pinLabel');

document.getElementById('pinCancel').onclick = () => resolvePinDialog(null);
document.getElementById('pinConfirm').onclick  = () => resolvePinDialog(pinInput.value);
pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') resolvePinDialog(pinInput.value); });

function showPinDialog(label) {
  return new Promise(resolve => {
    pinResolve = resolve;
    pinLabel.textContent = label;
    pinInput.value = ''; pinError.textContent = '';
    pinModal.classList.add('visible');
    setTimeout(() => pinInput.focus(), 50);
  });
}
function resolvePinDialog(pin) {
  pinModal.classList.remove('visible');
  if (pinResolve) { pinResolve(pin); pinResolve = null; }
}

let _sendInFlight = false;
async function sendMode(groupId, mode, groupName) {
  if (_sendInFlight) return;
  _sendInFlight = true;
  let pin = '';
  if (window._pinRequired) {
    pin = await showPinDialog(`${groupName} → ${mode === 'manual' ? 'MANUELL' : 'AUTO'}`);
    if (pin === null) { _sendInFlight = false; return; }
  }
  try {
    const r = await fetch('/api/mode', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ groupId, mode, pin }),
    });
    if (r.status === 403) {
      window._pinRequired = true;
      pin = await showPinDialog(`${groupName} → ${mode === 'manual' ? 'MANUELL' : 'AUTO'}`);
      if (pin === null) { _sendInFlight = false; return; }
      const r2 = await fetch('/api/mode', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groupId, mode, pin }),
      });
      if (r2.status === 403) { pinError.textContent = 'Falsche PIN'; pinModal.classList.add('visible'); }
      else if (!r2.ok) console.error('Mode-Fehler:', r2.status);
    } else if (!r.ok) {
      console.error('Mode-Fehler:', r.status);
    }
  } catch(e) { console.error('Mode-Fehler:', e); } finally { _sendInFlight = false; }
}

async function sendControl(groupId, actuatorId, command, label) {
  if (_sendInFlight) return;
  _sendInFlight = true;
  let pin = '';
  if (window._pinRequired) {
    pin = await showPinDialog(label);
    if (pin === null) { _sendInFlight = false; return; }
  }
  try {
    const r = await fetch('/api/control', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ groupId, actuatorId, command, durationMinutes: 60, pin }),
    });
    if (r.status === 403) {
      window._pinRequired = true;
      pin = await showPinDialog(label);
      if (pin === null) { _sendInFlight = false; return; }
      const r2 = await fetch('/api/control', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groupId, actuatorId, command, durationMinutes: 60, pin }),
      });
      if (r2.status === 403) { pinError.textContent = 'Falsche PIN'; pinModal.classList.add('visible'); }
      else if (!r2.ok) console.error('Control-Fehler:', r2.status);
    } else if (!r.ok) {
      console.error('Control-Fehler:', r.status);
    }
  } catch(e) { console.error('Control-Fehler:', e); } finally { _sendInFlight = false; }
}

// Trend-Popup
let trendPopupActive = false;
async function showTrend(groupId, variable, label, unit, setMin, setMax) {
  if (trendPopupActive) { closeTrend(); return; }
  trendPopupActive = true;
  const popup = document.getElementById('trendPopup');
  document.getElementById('trendTitle').textContent = `${label} – letzte 48 h`;
  document.getElementById('trendChart').innerHTML = '<p style="color:var(--text-dim);padding:20px">Lade…</p>';
  popup.classList.add('visible');
  try {
    const res = await fetch(`/api/trends/${groupId}/${variable}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const payload = await res.json();
    // API liefert {points, hint?} oder (legacy) ein Array
    const points = Array.isArray(payload) ? payload : (payload.points ?? []);
    const hint = Array.isArray(payload) ? null : (payload.hint ?? null);
    if (hint) {
      document.getElementById('trendChart').innerHTML =
        `<div class="trend-hint">ℹ️ ${hint.split('\n').map(esc).join('<br>')}</div>`;
    } else {
      renderTrendChart(points, unit, setMin, setMax);
    }
  } catch(e) {
    document.getElementById('trendChart').innerHTML = '<p style="color:var(--warn)">Fehler beim Laden</p>';
  }
}
function closeTrend() {
  trendPopupActive = false;
  document.getElementById('trendPopup').classList.remove('visible');
}
function renderTrendChart(points, unit, setMin, setMax) {
  const el = document.getElementById('trendChart');
  if (!points || points.length < 2) {
    el.innerHTML = '<p style="color:var(--text-dim);padding:20px">Noch nicht genug Daten (mind. 2 Stunden)</p>';
    return;
  }
  const W = 480, H = 160, PL = 44, PR = 12, PT = 10, PB = 28;
  const vals = points.map(p => p.value);
  const ts   = points.map(p => p.ts);
  // Expand Y range to include setpoint lines if provided
  const dataMin = Math.min(...vals), dataMax = Math.max(...vals);
  const allV = [...vals];
  if (setMin != null) allV.push(setMin);
  if (setMax != null) allV.push(setMax);
  const minV = Math.min(...allV), maxV = Math.max(...allV);
  const range = maxV - minV || 1;
  const minT = ts[0], maxT = ts[ts.length - 1];
  const tRange = maxT - minT || 1;
  const px = t => PL + ((t - minT) / tRange) * (W - PL - PR);
  const py = v => PT + (1 - (v - minV) / range) * (H - PT - PB);

  const polyline = points.map(p => `${px(p.ts).toFixed(1)},${py(p.value).toFixed(1)}`).join(' ');
  const area = `${px(ts[0]).toFixed(1)},${(H-PB).toFixed(1)} ` +
    points.map(p => `${px(p.ts).toFixed(1)},${py(p.value).toFixed(1)}`).join(' ') +
    ` ${px(ts[ts.length-1]).toFixed(1)},${(H-PB).toFixed(1)}`;

  // Y-Achse: 3 Labels
  const yLabels = [minV, minV + range / 2, maxV].map((v, i) => {
    const y = py(v);
    return `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-dasharray="3,3"/>
            <text x="${PL-4}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--text-dim)">${v.toFixed(1)}</text>`;
  }).join('');

  // Gestrichelte Soll-Min/Max Linien
  let setpointLines = '';
  if (setMax != null) {
    const y = py(setMax);
    setpointLines += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="var(--green-light,#7ecb7e)" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.85"/>
      <text x="${(W-PR-2).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--green-light,#7ecb7e)" opacity="0.9">Soll-Max ${setMax.toFixed(1)}</text>`;
  }
  if (setMin != null) {
    const y = py(setMin);
    setpointLines += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="var(--green-light,#7ecb7e)" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.85"/>
      <text x="${(W-PR-2).toFixed(1)}" y="${(y+10).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--green-light,#7ecb7e)" opacity="0.9">Soll-Min ${setMin.toFixed(1)}</text>`;
  }

  // X-Achse: Zeitstempel alle ~12h
  const step = Math.ceil(points.length / 4);
  const xLabels = points.filter((_, i) => i % step === 0).map(p => {
    const x = px(p.ts);
    const d = new Date(p.ts);
    const lbl = `${d.getHours().toString().padStart(2,'0')}:00`;
    return `<text x="${x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--text-dim)">${lbl}</text>`;
  }).join('');

  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <rect x="${PL}" y="${PT}" width="${W-PL-PR}" height="${H-PT-PB}" fill="#ffffff" fill-opacity="0.03" rx="2"/>
    ${yLabels}
    ${setpointLines}
    <polygon points="${area}" fill="#42a5f5" fill-opacity="0.18"/>
    <polyline points="${polyline}" fill="none" stroke="#42a5f5" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${xLabels}
    <text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#666">${unit}</text>
  </svg>`;
}

function closeLs() {

}
async function saveLs() {
  if (!lsCurrentGroup) return;

    vegStart:    document.getElementById('lsVegStart').value    || null,
    vegDays:     parseInt(document.getElementById('lsVegDays').value)    || null,

function lsDaysSince(dateStr) {
  if (!dateStr) return null;
  const diff = Date.now() - new Date(dateStr).getTime();
  return Math.floor(diff / 86400000);
}

function lsBarHtml(groupId) {
  const d = lsCache[groupId];
  if (!d || (!d.vegStart && !d.flowerStart)) return '';
  const lines = [];

  const vegDay  = lsDaysSince(d.vegStart);
  const florDay = lsDaysSince(d.flowerStart);

  if (d.vegStart && d.vegDays) {
    const pct = Math.min(100, Math.max(0, Math.round((vegDay / d.vegDays) * 100)));
    const done = vegDay >= d.vegDays;
    const color = done ? 'var(--text-dim)' : '#66bb6a';
    lines.push(`<div class="ls-phase">
      <span class="ls-phase-label">🌱 Wuchs</span>
      <div class="ls-progress-track"><div class="ls-progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="ls-phase-info">Tag ${Math.max(0,vegDay)} / ${+d.vegDays}</span>
    </div>`);
  } else if (d.vegStart) {
    lines.push(`<div class="ls-phase"><span class="ls-phase-label">🌱 Wuchs</span><span class="ls-phase-info">Tag ${Math.max(0,vegDay)}</span></div>`);
  }

  if (d.flowerStart && d.flowerDays) {
    const pct = Math.min(100, Math.max(0, Math.round((florDay / d.flowerDays) * 100)));
    const done = florDay >= d.flowerDays;
    const color = done ? 'var(--text-dim)' : '#ce93d8';
    lines.push(`<div class="ls-phase">
      <span class="ls-phase-label">🌸 Blüte</span>
      <div class="ls-progress-track"><div class="ls-progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="ls-phase-info">Tag ${Math.max(0,florDay)} / ${+d.flowerDays}</span>
    </div>`);
  } else if (d.flowerStart) {
    lines.push(`<div class="ls-phase"><span class="ls-phase-label">🌸 Blüte</span><span class="ls-phase-info">Tag ${Math.max(0,florDay)}</span></div>`);
  }

  // Erntedatum berechnen
  let harvestHtml = '';
  const baseDate = d.flowerStart && d.flowerDays ? d.flowerStart
                 : d.vegStart    && d.vegDays    ? d.vegStart    : null;
  const baseDays = d.flowerStart && d.flowerDays ? d.flowerDays
                 : d.vegDays ?? null;
  if (baseDate && baseDays) {
    const harvest = new Date(new Date(baseDate).getTime() + baseDays * 86400000);
    const daysLeft = Math.ceil((harvest.getTime() - Date.now()) / 86400000);
    const harvestStr = harvest.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
    harvestHtml = `<div class="ls-harvest">📅 Ernte ~${harvestStr}${daysLeft > 0 ? ` (noch ${daysLeft} Tage)` : ' (Termin erreicht)'}</div>`;
  }

  return `<div class="ls-bar">${lines.join('')}</div>${harvestHtml}`;
}

async function loadAllLifestyle(groups) {
  await Promise.all(groups.map(async g => {
    if (lsCache[g.id] !== undefined) return;
    try {
      const res = await fetch(`/api/lifestyle/${g.id}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      lsCache[g.id] = await res.json();
    } catch { lsCache[g.id] = {}; }
  }));
}

function renderLsBars() {
  document.querySelectorAll('[data-ls-bar]').forEach(el => {
    el.innerHTML = lsBarHtml(el.dataset.lsBar);
  });
}

// ---- Datenbank-Popup ----
let dbCurrentGroup = null;
let dbCurrentTab = 'stats';
let dbCurrentData = [];
let dbWeekOffset = 0;
let dbSwitchInFlight = false;

async function showDb(groupId, groupName, tab = 'stats') {
  dbCurrentGroup = groupId;
  document.getElementById('dbTitle').textContent = `Verlaufsdaten – ${groupName}`;
  document.getElementById('dbPopup').classList.add('visible');
  await dbSwitchTab(tab);
}
function closeDb() {
  document.getElementById('dbPopup').classList.remove('visible');
  dbCurrentGroup = null;
}

async function dbSwitchTab(tab) {
  if (!dbCurrentGroup || dbSwitchInFlight) return;
  dbCurrentTab = tab;
  document.getElementById('dbTabStats')?.classList.toggle('active', tab === 'stats');
  document.getElementById('dbTabEnergy')?.classList.toggle('active', tab === 'energy');
  document.getElementById('dbTabIrr')?.classList.toggle('active', tab === 'irrigation');

  const body = document.getElementById('dbBody');
  body.innerHTML = '<p style="color:var(--text-dim);padding:20px">Lade…</p>';
  dbSwitchInFlight = true;
  try {
    const res = await fetch(`/api/database/${dbCurrentGroup}/${tab}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    dbCurrentData = await res.json();
    dbWeekOffset = 0;
    dbReRender();
  } catch(e) {
    body.innerHTML = '<p style="color:var(--warn);padding:20px">Fehler beim Laden</p>';
  } finally {
    dbSwitchInFlight = false;
  }
}

function dbWeekSlice(data) {
  return data.slice(dbWeekOffset * 7, (dbWeekOffset + 1) * 7);
}

function renderWeekNav(data) {
  const totalPages = Math.ceil(data.length / 7);
  if (totalPages <= 1) return '';
  const slice = dbWeekSlice(data);
  const canOlder = dbWeekOffset < totalPages - 1;
  const canNewer = dbWeekOffset > 0;
  const first = esc((slice[0]?.date ?? '').split(' ')[0]);
  const last  = esc((slice[slice.length - 1]?.date ?? '').split(' ')[0]);
  const label = dbWeekOffset === 0
    ? `Aktuelle Woche (${last} – ${first})`
    : `Woche ${dbWeekOffset + 1} (${last} – ${first})`;
  const btn = 'padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card,rgba(255,255,255,.06));color:var(--text);cursor:pointer;font-size:13px';
  const dim = 'opacity:.3;cursor:default;pointer-events:none';
  return `<div style="display:flex;align-items:center;gap:10px;padding:0 0 14px;user-select:none">
    <button style="${btn}${canOlder?'':';'+dim}" onclick="dbWeekOffset++;dbReRender()">◀ Älter</button>
    <span style="flex:1;text-align:center;font-size:13px;color:var(--text-dim)">${label}</span>
    <button style="${btn}${canNewer?'':';'+dim}" ${canNewer?'':'disabled'} onclick="dbWeekOffset--;dbReRender()">Neuer ▶</button>
  </div>`;
}

function dbReRender() {
  const body = document.getElementById('dbBody');
  if (!body) return;
  const isDayBased = dbCurrentTab === 'stats' || dbCurrentTab === 'energy';
  const slice = isDayBased ? dbWeekSlice(dbCurrentData) : dbCurrentData;
  const nav   = isDayBased && dbCurrentData.length > 7 ? renderWeekNav(dbCurrentData) : '';
  body.innerHTML = nav + (
    dbCurrentTab === 'stats'   ? renderStatsTable(slice)
  : dbCurrentTab === 'energy'  ? renderEnergyTable(slice)
  : renderIrrigationTable(dbCurrentData)
  );
}

function renderStatsTable(data) {
  if (!data || data.length === 0) return '<p style="color:var(--text-dim);padding:20px">Noch keine Tagesdaten vorhanden.</p>';
  const sensorIds = [...new Set(data.flatMap(d => Object.keys(d.sensors ?? {})))];
  const sensorLabels = { temperature: 'Temperatur °C', humidity: 'Feuchte %', vpd: 'VPD kPa', co2: 'CO₂ ppm' };
  const getName = id => {
    if (sensorLabels[id]) return sensorLabels[id];
    for (const row of data) {
      const s = row.sensors?.[id];
      if (s?.name && s.name !== id) return s.name;
    }
    return id;
  };
  let html = '<div style="display:flex;flex-wrap:wrap;gap:16px;padding:4px 0">';
  for (const id of sensorIds) {
    html += `<div style="flex:1 1 260px;min-width:220px;border:1px solid var(--border);border-radius:8px;overflow:hidden">`;
    html += `<div style="padding:10px 14px;background:var(--bg-card,rgba(255,255,255,.04));border-bottom:1px solid var(--border);font-weight:600">${esc(getName(id))}</div>`;
    html += `<table class="db-table" style="margin:0;border:none"><thead>`;
    html += `<tr><th>Datum</th><th style="text-align:right;color:#5bbddd">Min</th><th style="text-align:right">Avg</th><th style="text-align:right;color:#e87060">Max</th></tr>`;
    html += `</thead><tbody>`;
    for (const row of data) {
      const s = row.sensors?.[id];
      if (!s) continue;
      html += `<tr>`;
      html += `<td>${esc(row.date)}</td>`;
      html += `<td style="text-align:right;color:#5bbddd">${s.min != null ? s.min.toFixed(1) : '–'}</td>`;
      html += `<td style="text-align:right;font-weight:600">${s.avg != null ? s.avg.toFixed(1) : '–'}</td>`;
      html += `<td style="text-align:right;color:#e87060">${s.max != null ? s.max.toFixed(1) : '–'}</td>`;
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
  }
  return html + '</div>';
}

function renderEnergyTable(data) {
  if (!data || data.length === 0) return '<p style="color:var(--text-dim);padding:20px">Noch keine Energiedaten (Nennleistung oder kWh-State bei Aktoren konfigurieren).</p>';
  const actIds = [...new Set(data.flatMap(d => Object.keys(d.actuators ?? {})))];
  const names = {};
  data.forEach(d => Object.entries(d.actuators ?? {}).forEach(([id,a]) => { names[id] = a.name; }));

  const totals = {};
  actIds.forEach(id => { totals[id] = { wh: 0, runtimeMin: 0 }; });
  data.forEach(d => actIds.forEach(id => {
    const a = d.actuators?.[id];
    if (a) { totals[id].wh += a.wh; totals[id].runtimeMin += a.runtimeMin; }
  }));

  const fmtRuntime = min => {
    const h = Math.floor(min / 60), m = Math.round(min % 60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  };
  const fmtAvgW = (wh, runtimeMin) => runtimeMin > 0 ? (wh / (runtimeMin / 60)).toFixed(0) + ' W' : '–';
  const fmtWh = wh => wh >= 1000 ? (wh / 1000).toFixed(2) + ' kWh' : wh.toFixed(0) + ' Wh';

  let html = '<div style="display:flex;flex-wrap:wrap;gap:16px;padding:4px 0">';
  for (const id of actIds) {
    const tot = totals[id];
    html += `<div style="flex:1 1 280px;min-width:260px;border:1px solid var(--border);border-radius:8px;overflow:hidden">`;
    html += `<div style="padding:10px 14px;background:var(--bg-card, rgba(255,255,255,.04));border-bottom:1px solid var(--border);font-weight:600">${esc(names[id] ?? id)}</div>`;
    html += `<table class="db-table" style="margin:0;border:none">`;
    html += `<thead><tr><th>Datum</th><th style="text-align:right">Energie</th><th style="text-align:right">Laufzeit</th><th style="text-align:right">Ø W</th></tr></thead><tbody>`;
    for (const row of data) {
      const a = row.actuators?.[id];
      if (!a) continue;
      html += `<tr>`;
      html += `<td>${esc(row.date)}</td>`;
      html += `<td style="text-align:right">${fmtWh(a.wh)}</td>`;
      html += `<td style="text-align:right">${fmtRuntime(a.runtimeMin)}</td>`;
      html += `<td style="text-align:right;color:var(--text-dim)">${fmtAvgW(a.wh, a.runtimeMin)}</td>`;
      html += `</tr>`;
    }
    html += `<tr style="font-weight:600;border-top:2px solid var(--border)">`;
    html += `<td>Gesamt</td>`;
    html += `<td style="text-align:right;color:var(--accent)">${fmtWh(tot.wh)}</td>`;
    html += `<td style="text-align:right">${fmtRuntime(tot.runtimeMin)}</td>`;
    html += `<td style="text-align:right;color:var(--text-dim)">${fmtAvgW(tot.wh, tot.runtimeMin)}</td>`;
    html += `</tr>`;
    html += `</tbody></table></div>`;
  }
  return html + '</div>';
}

function renderIrrigationTable(data) {
  if (!data || data.length === 0) return '<p style="color:var(--text-dim);padding:20px">Noch keine Bewässerungsereignisse aufgezeichnet.</p>';
  let html = `<table class="db-table"><thead><tr><th>Zeitpunkt</th><th>Zone</th><th>Dauer</th><th>Start-Feuchte</th><th>End-Feuchte</th><th>Auslöser</th><th>Liter</th></tr></thead><tbody>`;
  for (const ev of data) {
    const d = new Date(ev.ts);
    const ts = `${d.toLocaleDateString('de-DE')} ${d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}`;
    const sec = +ev.durationSec;
    const dur = sec >= 60 ? `${Math.floor(sec/60)}m ${sec%60}s` : `${sec}s`;
    const sm = ev.startMoisture != null ? ev.startMoisture.toFixed(0)+'%' : '–';
    const em = ev.endMoisture   != null ? ev.endMoisture.toFixed(0)+'%'   : '–';
    html += `<tr><td>${ts}</td><td>${esc(ev.zoneName)}</td><td>${dur}</td><td>${sm}</td><td>${em}</td><td>${esc(ev.trigger)}</td><td>${ev.flowLiters>0?ev.flowLiters.toFixed(1):'–'}</td></tr>`;
  }
  return html + '</tbody></table>';
}

function dbExport() {
  if (!dbCurrentData || dbCurrentData.length === 0) return;
  let csv = '';
  if (dbCurrentTab === 'irrigation') {
    csv = 'Zeitpunkt;Zone;Dauer_s;Start_%%;End_%%;Auslöser;Liter\n';
    csv += dbCurrentData.map(ev => `${new Date(ev.ts).toLocaleString('de-DE')};${ev.zoneName};${ev.durationSec};${ev.startMoisture??''};${ev.endMoisture??''};${ev.trigger};${ev.flowLiters}`).join('\n');
  } else if (dbCurrentTab === 'energy') {
    const actIds = [...new Set(dbCurrentData.flatMap(d => Object.keys(d.actuators ?? {})))];
    csv = 'Datum;' + actIds.map(id => `${id}_Wh;${id}_min`).join(';') + '\n';
    csv += dbCurrentData.map(row => row.date + ';' + actIds.map(id => {
      const a = row.actuators?.[id]; return a ? `${a.wh.toFixed(0)};${a.runtimeMin.toFixed(0)}` : ';';
    }).join(';')).join('\n');
  } else {
    const sids = [...new Set(dbCurrentData.flatMap(d => Object.keys(d.sensors ?? {})))];
    csv = 'Datum;' + sids.map(id => `${id}_min;${id}_avg;${id}_max`).join(';') + '\n';
    csv += dbCurrentData.map(row => row.date + ';' + sids.map(id => {
      const s = row.sensors?.[id]; return s ? `${s.min};${s.avg};${s.max}` : ';;';
    }).join(';')).join('\n');
  }
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `growmanager-${dbCurrentTab}-${dbCurrentGroup}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ---- Aktive-Geräte-Zeile ----
function actIconsHtml(actuators, groupId, manualOverrides) {
  if (!actuators || actuators.length === 0) return '';
  const chips = actuators.map(a => {
    const sollOn = a.command === true || (typeof a.command === 'number' && a.command > 0);
    const fb = a.feedback ?? a.effectiveState;
    const isOn = fb !== null && fb !== undefined
      ? (fb === true || (typeof fb === 'number' && fb > 0) || fb === 'true' || fb === 'on')
      : sollOn;
    const t = ACT_TYPE[a.type] ?? ACT_TYPE.custom;
    const ov = manualOverrides && manualOverrides[a.id];
    const ovNote = ov ? ` · manuell bis ${new Date(ov.until).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}` : '';
    const pulse = isOn ? '<span class="act-icon-pulse"></span>' : '';
    const unreachable = a.health === 'unreachable';
    const errBadge = unreachable ? '<span class="act-chip-err">!</span>' : '';
    const sharedMark = a.shared && a.sharedParticipants && a.sharedParticipants.length ? '⇄' : '';
    const tipShared = sharedMark ? ` · geteilt (${esc(a.sharedVotingMode ?? 'any')}, ${a.sharedParticipants.length} Gruppe(n))` : '';
    return `<span class="act-icon-chip ${isOn ? 'on ' + t.cls : 'off'}${unreachable ? ' chip-unreachable' : ''}">
      ${t.icon}${sharedMark}${errBadge}${pulse}
      <span class="act-icon-tip">${esc(a.name)}${ovNote}${tipShared} · ${unreachable ? '⚠ Nicht erreichbar' : (isOn ? 'EIN' : 'AUS')}</span>
    </span>`;
  }).join('');
  return `<div class="act-icons-row">${chips}</div>`;
}

// ---- Klimawert mit Sollwert ----
function climateValHtml(value, unit, label, isControlled, setMin, setMax, setTarget, decimals) {
  const numFmt = value !== null ? value.toFixed(decimals ?? 1) : null;
  const numHtml = value !== null
    ? `<div class="climate-num${isControlled ? '' : ' dim'}">${numFmt}${unit}</div>`
    : `<div class="climate-num null-val">–</div>`;

  let setpointHtml = '';
  if (isControlled && (setMin !== null || setTarget !== null) && value !== null) {
    if (setMin !== null && setMax !== null) {
      // Bereichs-Sollwert (VPD, Feuchte): zeige Bereich als Bar
      const range = setMax - setMin;
      const displayMin = Math.min(setMin * 0.85, value * 0.9);
      const displayMax = Math.max(setMax * 1.15, value * 1.1);
      const displayRange = displayMax - displayMin;
      const rangeStart = Math.max(0, Math.min(100, (setMin - displayMin) / displayRange * 100));
      const rangeWidth = Math.max(0, Math.min(100 - rangeStart, range / displayRange * 100));
      const markerPos  = Math.max(0, Math.min(100, (value - displayMin) / displayRange * 100));
      const inRange = value >= setMin && value <= setMax;
      const cls = inRange ? 'ok' : Math.abs(value - (setMin + range/2)) < range ? 'warn' : 'fault';
      setpointHtml = `
        <div class="setpoint-bar">
          <div class="setpoint-range" style="left:${rangeStart.toFixed(1)}%;width:${rangeWidth.toFixed(1)}%"></div>
          <div class="setpoint-marker" style="left:${markerPos.toFixed(1)}%"></div>
        </div>
        <div class="setpoint-text ${cls}">Soll ${setMin.toFixed(decimals??1)}–${setMax.toFixed(decimals??1)}${unit}</div>`;
    } else if (setTarget !== null) {
      // Punktsollwert (Temperatur)
      const diff = value - setTarget;
      const cls = Math.abs(diff) <= 1 ? 'ok' : Math.abs(diff) <= 3 ? 'warn' : 'fault';
      const sign = diff >= 0 ? '+' : '';
      setpointHtml = `<div class="setpoint-text ${cls}">Soll ${setTarget.toFixed(decimals??1)}${unit} (${sign}${diff.toFixed(decimals??1)})</div>`;
    }
  }

  return `<div class="climate-val${isControlled ? ' controlled' : ''}">
    ${numHtml}
    <div class="climate-label">${esc(label)}</div>
    ${setpointHtml}
  </div>`;
}

// ---- Aktor Detail-Zeile ----
function actuatorHtml(a, groupId, groupName, manualOverrides, isManualMode) {
  // Externer geteilter Aktor (nur Teilnehmer, kein Eigentümer dieser Gruppe)
  if (a.sharedFromGroupId) {
    const fb = a.feedback ?? a.effectiveState;
    const hasFb = fb !== null && fb !== undefined;
    const sollOn = a.command === true || (typeof a.command === 'number' && a.command > 0);
    const istOn = hasFb
      ? (fb === true || (typeof fb === 'number' && fb > 0) || fb === 'true' || fb === 'on')
      : sollOn;
    const ledClass = istOn ? 'on' : 'off';
    const t = ACT_TYPE[a.type] ?? ACT_TYPE.custom;
    const influence = a.influenceFactor != null ? ` · ${+a.influenceFactor}% Einfluss` : '';
    const istHtml = hasFb
      ? ` <span class="act-label-dim">Ist:</span> <span class="act-state ${istOn?'on':'off'}">${istOn?'EIN':'AUS'}</span>`
      : '';
    return `<div class="actuator-row act-shared-extern">
      <div class="act-dot ${ledClass}"></div>
      <span class="act-name">${t.icon} ${esc(a.name)}</span>
      <span class="act-shared-from-badge" title="Eigentümer: ${esc(a.sharedFromGroupName ?? '')}${influence}">⇄ ${esc(a.sharedFromGroupName ?? '')}</span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:4px">
        <span class="act-label-dim">Soll:</span>
        <span class="act-state ${sollOn?'on':'off'}">${sollOn?'EIN':'AUS'}</span>${istHtml}
      </span>
    </div>`;
  }
  const sollOn = a.command === true || (typeof a.command === 'number' && a.command > 0);
  const isPercent = typeof a.command === 'number' && a.command > 0;
  const t = ACT_TYPE[a.type] ?? ACT_TYPE.custom;
  const ov = manualOverrides && manualOverrides[a.id];

  // Ist-Zustand: feedback bevorzugt, sonst effectiveState
  const fb = a.feedback ?? a.effectiveState;
  const hasFeedback = fb !== null && fb !== undefined;
  const istOn = hasFeedback
    ? (fb === true || (typeof fb === 'number' && fb > 0) || fb === 'true' || fb === 'on')
    : sollOn;

  // LED zeigt Ist-Zustand (nicht Soll), damit physisches Ausschalten sichtbar ist
  const ledClass = istOn ? 'on' : 'off';

  // Per-Aktor AUTO/MANUELL-Badge: klickbar zum Zurücksetzen auf AUTO
  const modeBadge = ov
    ? `<span class="act-override-badge clickable" title="Auf AUTO zurücksetzen – setzt alle Aktoren der Gruppe auf AUTO"
         onclick="sendMode('${escAttr(groupId)}','auto','${escAttr(groupName)}')">MANUELL ↩</span>`
    : `<span class="act-mode-badge">AUTO</span>`;

  // Soll-Wert
  const votes = (a.votes && a.votes.length > 0) ? a.votes : null;
  let votingTooltipHtml = '';
  if (votes) {
    const modeLabel = { any: 'ANY', majority: 'Mehrheit', primary: 'Eigentümer' }[a.sharedVotingMode ?? 'any'] ?? esc(a.sharedVotingMode ?? '');
    const rows = votes.map(v => {
      const dotColor = v.wantsOn ? 'var(--green-light)' : 'var(--red)';
      const label = v.wantsOn ? 'EIN' : 'AUS';
      const pct = Math.round(v.weight * 100);
      // Im Mehrheits-Modus: effektives Gewicht = weight × (1 + urgency)
      const isMajority = (a.sharedVotingMode ?? 'any') === 'majority';
      const effPct = isMajority ? Math.round(v.weight * (1 + v.urgency) * 100) : pct;
      const weightHtml = isMajority && effPct !== pct
        ? `${pct}%<span style="color:var(--accent)">→${effPct}%</span>`
        : `${pct}%`;
      const reasonHtml = v.reason ? `<div class="v-vote-reason">${esc(v.reason)}</div>` : '';
      return `<div class="v-vote-row">
        <div class="v-vote-dot" style="background:${dotColor}"></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="v-vote-name">${esc(v.groupName ?? v.groupId)}</span>
            <span class="v-vote-val" style="color:${dotColor}">${label}</span>
            <span style="font-size:10px;opacity:0.6">${weightHtml}${v.urgency > 0 ? ' u:'+v.urgency.toFixed(1) : ''}</span>
          </div>
          ${reasonHtml}
        </div>
      </div>`;
    }).join('');
    votingTooltipHtml = `<div class="voting-tooltip-data">
      <div style="font-weight:700;margin-bottom:6px;color:var(--text)">Abstimmung (${modeLabel})</div>
      ${rows}
    </div>`;
  }
  const sollInner = isPercent
    ? `<span class="act-soll-label">Soll:</span><span class="act-percent">${Math.round(a.command)}%</span>
       <div class="percent-bar-wrap"><div class="percent-bar-fill" style="width:${a.command}%"></div></div>`
    : `<span class="act-soll-label">Soll:</span><span class="act-state ${sollOn?'on':'off'}">${sollOn?'EIN':'AUS'}</span>`;
  let sollHtml = votes
    ? `<span class="act-soll-voting">${sollInner}${votingTooltipHtml}</span>`
    : sollInner;

  // Ist-Wert (nur anzeigen wenn Feedback-State konfiguriert, sonst identisch mit Soll)
  let istHtml = '';
  if (hasFeedback) {
    istHtml = `<span class="act-ist-label">Ist:</span><span class="act-state ${istOn?'on':'off'}">${istOn?'EIN':'AUS'}</span>`;
  }

  // Countdown: Sperrzeit / Wind-Sim-Phase / manualLock
  let countdownHtml = '';
  if (a.blockSecondsLeft > 0) {
    const mins = Math.floor(a.blockSecondsLeft / 60);
    const secs = a.blockSecondsLeft % 60;
    const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
    const untilAttr = a.blockUntil ? ` data-until="${+a.blockUntil}"` : '';
    countdownHtml = `<span class="act-countdown blk-cd" id="blk-cd-${esc(a.id)}"${untilAttr} title="${esc(a.blockReason ?? 'Sperrzeit läuft')}">⏱ ${timeStr}</span>`;
  } else if (a.windSimNextChangeAt !== undefined) {
    const wsOn = a.windSimIsOn;
    const wsColor = wsOn ? 'var(--accent)' : 'var(--muted)';
    const wsRemInit = Math.max(0, Math.round((a.windSimNextChangeAt - Date.now()) / 1000));
    const wsMi = Math.floor(wsRemInit / 60), wsSi = wsRemInit % 60;
    const wsInitStr = wsMi > 0 ? `${wsMi}m ${wsSi.toString().padStart(2,'0')}s` : `${wsSi}s`;
    countdownHtml = `<span class="act-countdown ws-cd" id="ws-cd-${esc(a.id)}" data-until="${+a.windSimNextChangeAt}" data-on="${wsOn ? 'true' : 'false'}" style="color:${wsColor}">🌀 ${wsOn?'EIN':'AUS'} noch ${wsInitStr}</span>`;
  } else if (a.manualLock) {
    countdownHtml = `<span class="act-manual-lock" title="Manuell gesperrt – Auto-Zyklus pausiert">🔒 MANUELL</span>`;
  }
  // Soll≠Ist ohne sonstigen Grund: Befehl unterwegs oder Gerät reagiert nicht
  if (!countdownHtml && hasFeedback && sollOn && !istOn) {
    countdownHtml = `<span class="act-pending" title="Befehl EIN gesendet – warte auf Gerät-Feedback (Alarm folgt wenn Gerät nicht reagiert)">⏳</span>`;
  } else if (!countdownHtml && hasFeedback && !sollOn && istOn) {
    countdownHtml = `<span class="act-pending" title="Befehl AUS gesendet – Gerät noch EIN (Alarm folgt wenn Gerät nicht reagiert)">⏳</span>`;
  }

  const ctrlBtns = isManualMode || ov
    ? `<button class="act-toggle on-btn"  onclick="sendControl('${escAttr(groupId)}','${escAttr(a.id)}',true,'${escAttr(a.name)} einschalten')">EIN</button>
       <button class="act-toggle off-btn" onclick="sendControl('${escAttr(groupId)}','${escAttr(a.id)}',false,'${escAttr(a.name)} ausschalten')">AUS</button>`
    : '';

  const unreachable = a.health === 'unreachable';
  const healthIcon = unreachable
    ? `<span class="act-health-err" title="Gerät nicht erreichbar">📵</span>`
    : (a.health !== 'ok' && a.health !== 'unknown'
        ? `<span class="act-health-warn" title="Gerätestatus: ${esc(a.health)}">⚠</span>`
        : '');

  const sharedBadge = a.shared && a.sharedParticipants && a.sharedParticipants.length
    ? `<span class="act-shared-badge" title="Geteilt mit ${a.sharedParticipants.length} Gruppe(n) · ${esc(a.sharedVotingMode ?? 'any')}">⇄ ${a.sharedParticipants.length}</span>`
    : '';

  const powerHtml = (typeof a.power === 'number')
    ? `<span class="act-power" title="Live-Leistung">⚡${a.power.toFixed(0)} W</span>`
    : (a.ratedPowerW && istOn)
      ? `<span class="act-power act-power-rated" title="Nennleistung (geschätzt)">~${+a.ratedPowerW} W</span>`
      : '';

  return `<div class="actuator-row${unreachable ? ' act-unreachable' : ''}">
    <div class="act-dot ${ledClass}"></div>
    <span class="act-name">${t.icon} ${esc(a.name)}</span>
    ${sharedBadge}${healthIcon}${modeBadge}${sollHtml}${istHtml}${countdownHtml}${powerHtml}
    ${ctrlBtns}
  </div>`;
}

// ---- Diagnose-Hinweise (Regelbereich-Analyse) ----
function diagHintHtml(g) {
  const hints = [];
  const controlled = MODE_CONTROLS[g.mode] ?? [];
  const isCtrlVpd  = controlled.includes('vpd');
  const isCtrlTemp = controlled.includes('temp');
  const isCtrlHum  = controlled.includes('hum');

  // Hilfsfunktionen
  const actOfType = (...types) => (g.actuators ?? []).filter(a => types.includes(a.type));
  const actNames  = (...types) => actOfType(...types).map(a => esc(a.name)).join(', ');
  const hasAct    = (...types) => actOfType(...types).length > 0;

  // VPD-Analyse (physikalisch: VPD = f(Temp↑, Feuchte↓))
  if (isCtrlVpd && g.vpd !== null && g.setpointVpdMin !== null && g.setpointVpdMax !== null) {
    const vpdLow  = g.vpd < g.setpointVpdMin;
    const vpdHigh = g.vpd > g.setpointVpdMax;
    if (vpdHigh) {
      // VPD zu hoch → Luft zu trocken/warm
      const delta = (g.vpd - g.setpointVpdMax).toFixed(2);
      const tempOverSoll = g.temperature !== null && g.setpointTemp !== null && g.temperature > g.setpointTemp + 1;
      let tip = `VPD zu hoch (+${delta} kPa) – Luft zu trocken${tempOverSoll ? ' und zu warm' : ''}.`;
      const fixes = [];
      if (hasAct('humidifier'))     fixes.push(`Befeuchter einschalten (${actNames('humidifier')})`);
      if (tempOverSoll && hasAct('cooling'))    fixes.push(`Kühlung erhöhen (${actNames('cooling')})`);
      if (tempOverSoll && hasAct('exhaustFan')) fixes.push(`Abluft erhöhen (${actNames('exhaustFan')})`);
      if (!tempOverSoll && hasAct('exhaustFan','supplyFan')) fixes.push(`Lüftung reduzieren um Feuchte zu halten`);
      if (g.outdoorHumidity !== null && g.humidity !== null && g.outdoorHumidity > g.humidity + 5)
        fixes.push(`Außenluft feuchter (${g.outdoorHumidity.toFixed(0)}%) → kurze Lüftung könnte helfen`);
      if (fixes.length) tip += ' Optionen: ' + fixes.join('; ') + '.';
      hints.push({ lvl: 'warn', text: tip });
    } else if (vpdLow) {
      // VPD zu niedrig → Luft zu feucht/kalt
      const delta = (g.setpointVpdMin - g.vpd).toFixed(2);
      const tempUnderSoll = g.temperature !== null && g.setpointTemp !== null && g.temperature < g.setpointTemp - 1;
      let tip = `VPD zu niedrig (−${delta} kPa) – Luft zu feucht${tempUnderSoll ? ' und zu kalt' : ''}.`;
      const fixes = [];
      if (hasAct('dehumidifier'))   fixes.push(`Entfeuchter einschalten (${actNames('dehumidifier')})`);
      if (tempUnderSoll && hasAct('heating')) fixes.push(`Heizung erhöhen (${actNames('heating')})`);
      if (hasAct('exhaustFan','supplyFan')) fixes.push(`Lüftung erhöhen um Feuchte abzuführen`);
      if (g.outdoorHumidity !== null && g.humidity !== null && g.outdoorHumidity < g.humidity - 5)
        fixes.push(`Außenluft trockener (${g.outdoorHumidity.toFixed(0)}%) → Lüftung könnte helfen`);
      if (fixes.length) tip += ' Optionen: ' + fixes.join('; ') + '.';
      hints.push({ lvl: 'warn', text: tip });
    }
  }

  // Temperatur-Analyse
  if (isCtrlTemp && g.temperature !== null && g.setpointTemp !== null) {
    const tol = 2; // ±2°C Toleranzband (grob, kein setpointTempTol im Stream)
    if (g.temperature > g.setpointTemp + tol) {
      const delta = (g.temperature - g.setpointTemp).toFixed(1);
      let tip = `Temperatur zu hoch (+${delta}°C über Soll ${g.setpointTemp}°C).`;
      const fixes = [];
      if (hasAct('cooling'))    fixes.push(actNames('cooling'));
      if (hasAct('exhaustFan')) fixes.push(`Abluft (${actNames('exhaustFan')})`);
      if (g.outdoorTemp !== null && g.outdoorTemp < g.temperature - 3)
        fixes.push(`Außenluft kühler (${g.outdoorTemp.toFixed(1)}°C) → Lüftung könnte helfen`);
      if (fixes.length) tip += ' Kühloption: ' + fixes.join(', ') + '.';
      hints.push({ lvl: 'warn', text: tip });
    } else if (g.temperature < g.setpointTemp - tol) {
      const delta = (g.setpointTemp - g.temperature).toFixed(1);
      let tip = `Temperatur zu niedrig (−${delta}°C unter Soll ${g.setpointTemp}°C).`;
      if (hasAct('heating')) tip += ` Heizung: ${actNames('heating')}.`;
      hints.push({ lvl: 'warn', text: tip });
    }
  }

  // Luftfeuchte-Analyse (nur wenn nicht VPD-gesteuert)
  if (isCtrlHum && !isCtrlVpd && g.humidity !== null && g.setpointHumidity !== null) {
    if (g.humidity > g.setpointHumidity + 5) {
      let tip = `Luftfeuchte zu hoch (${g.humidity.toFixed(0)}%, Soll ~${g.setpointHumidity}%).`;
      if (hasAct('dehumidifier')) tip += ` Entfeuchter: ${actNames('dehumidifier')}.`;
      hints.push({ lvl: 'warn', text: tip });
    } else if (g.humidity < g.setpointHumidity - 5) {
      let tip = `Luftfeuchte zu niedrig (${g.humidity.toFixed(0)}%, Soll ~${g.setpointHumidity}%).`;
      if (hasAct('humidifier')) tip += ` Befeuchter: ${actNames('humidifier')}.`;
      hints.push({ lvl: 'warn', text: tip });
    }
  }

  if (hints.length === 0) return '';

  const rows = hints.map(h =>
    `<div class="diag-hint-row ${h.lvl}">
      <span class="diag-hint-icon">${h.lvl === 'warn' ? '⚠' : 'ℹ'}</span>
      <span class="diag-hint-text">${h.text}</span>
    </div>`
  ).join('');
  return `<div class="diag-hints">${rows}</div>`;
}

// ---- Sensorqualitäts-Badge mit Tooltip ----
function qualityBadgeHtml(g) {
  const q = g.sensorQuality ?? 0;
  const color = q >= 90 ? 'var(--green-light)' : q >= 60 ? 'var(--yellow)' : 'var(--orange)';
  const sensors = g.sensorDetails ?? [];
  if (sensors.length === 0) {
    return `<span class="quality-badge meta-tag" style="color:${color}">Q: ${q}%</span>`;
  }
  const SENSOR_TYPE_LABELS = {
    temperature:'Temperatur', humidity:'Luftfeuchte', leafTemperature:'Blatt-T',
    soilMoisture:'Bodenfeuchte', co2:'CO₂', light:'Licht', tankLevel:'Tank',
    ph:'pH', ec:'EC', power:'Leistung', door:'Tür', custom:'Sensor',
  };
  const rows = sensors.map(s => {
    const dotColor = !s.valid ? 'var(--red)' : s.quality < 60 ? 'var(--orange)' : s.quality < 90 ? 'var(--yellow)' : 'var(--green-light)';
    const label = SENSOR_TYPE_LABELS[s.type] ?? esc(s.type);
    const errRow = (s.error && !s.valid) ? `<div style="font-size:10px;color:var(--orange);padding-left:16px;margin-top:-2px">${esc(s.error)}</div>` : '';
    return `<div class="q-sensor-row">
      <div class="q-sensor-dot" style="background:${dotColor}"></div>
      <span class="q-sensor-name">${esc(s.name)} <span style="font-size:10px;opacity:0.6">(${label})</span></span>
      <span class="q-sensor-val" style="color:${dotColor}">${+s.quality}%</span>
    </div>${errRow}`;
  }).join('');
  return `<span class="quality-badge meta-tag" style="color:${color}">Q: ${q}%
    <div class="quality-tooltip">
      <div style="font-weight:700;margin-bottom:6px;color:var(--text)">Sensorqualität</div>
      ${rows}
    </div>
  </span>`;
}

// ---- Gruppenkarte ----
function groupCardHtml(g) {
  const healthColor = HEALTH_COLORS[g.health] ?? 'var(--safe)';
  const controlled = MODE_CONTROLS[g.mode] ?? [];
  const isCtrlTemp = controlled.includes('temp');
  const isCtrlHum  = controlled.includes('hum');
  const isCtrlVpd  = controlled.includes('vpd');
  const isManual = g.runtimeMode === 'manual';

  const dayNightTag = g.dayNight === 'night'
    ? '<span class="meta-tag night">🌙 Nacht</span>'
    : g.dayNight === 'transition'
      ? '<span class="meta-tag transition" style="color:#f9a825">⇄ Übergang</span>'
      : '<span class="meta-tag day">☀ Tag</span>';

  let monitorTag = '';
  if (g.monitorSensors && g.monitorSensors.length > 0) {
    const names = g.monitorSensors.map(n => esc(n)).join('<br>');
    monitorTag = `<span class="monitor-info">ℹ Monitor (${g.monitorSensors.length})
      <div class="monitor-tooltip"><strong>Nur-Überwachung:</strong><br>${names}</div>
    </span>`;
  }

  // Klima-Zeile: Sollwert-Bar nur wenn der Modus diesen Wert regelt
  // Werte sind klickbar für Trend-Popup
  const gid = escAttr(g.id);
  const tempMin = g.setpointTemp != null && g.setpointTempTolerance != null ? g.setpointTemp - g.setpointTempTolerance : (g.setpointTempMin ?? null);
  const tempMax = g.setpointTemp != null && g.setpointTempTolerance != null ? g.setpointTemp + g.setpointTempTolerance : (g.setpointTempMax ?? null);
  const tempHtml = `<div onclick="showTrend('${gid}','temperature','Temperatur','°C',${tempMin},${tempMax})" style="cursor:pointer" title="Trend anzeigen">${climateValHtml(g.temperature, '°', 'Temperatur', isCtrlTemp, null, null, g.setpointTemp, 1)}</div>`;
  const humMin = g.setpointHumidity != null && g.setpointHumidityTolerance != null ? g.setpointHumidity - g.setpointHumidityTolerance : (g.setpointHumidityMin ?? null);
  const humMax = g.setpointHumidity != null && g.setpointHumidityTolerance != null ? g.setpointHumidity + g.setpointHumidityTolerance : (g.setpointHumidityMax ?? null);
  const humHtml  = `<div onclick="showTrend('${gid}','humidity','Luftfeuchte','%',${humMin},${humMax})" style="cursor:pointer" title="Trend anzeigen">${climateValHtml(g.humidity, '%', 'Luftfeuchte', isCtrlHum, g.setpointHumidity ? g.setpointHumidity - 5 : null, g.setpointHumidity ? g.setpointHumidity + 5 : null, null, 0)}</div>`;
  const vpdHtml  = `<div onclick="showTrend('${gid}','vpd','VPD','kPa',${g.setpointVpdMin ?? null},${g.setpointVpdMax ?? null})" style="cursor:pointer" title="Trend anzeigen">${climateValHtml(g.vpd, ' kPa', 'VPD', isCtrlVpd, g.setpointVpdMin, g.setpointVpdMax, null, 2)}</div>`;
  const isCtrlSoil = controlled.includes('soil');
  const isCtrlCo2  = controlled.includes('co2');

  const soilMin = g.setpointSoilMoistureTarget != null && g.setpointSoilMoistureTolerance != null ? g.setpointSoilMoistureTarget - g.setpointSoilMoistureTolerance : null;
  const soilMax = g.setpointSoilMoistureTarget != null && g.setpointSoilMoistureTolerance != null ? g.setpointSoilMoistureTarget + g.setpointSoilMoistureTolerance : null;
  let soilHtml = '';
  if (g.soilSensors && g.soilSensors.length > 1) {
    // Mehrere Bodenfeuchtesensoren → jeden einzeln anzeigen
    soilHtml = g.soilSensors.map(s => {
      return `<div onclick="showTrend('${gid}','soilMoisture','${escAttr(s.name)}','%',${soilMin},${soilMax})" style="cursor:pointer" title="Trend anzeigen">${
        climateValHtml(s.value, '%', s.name, isCtrlSoil, soilMin, soilMax, null, 0)}</div>`;
    }).join('');
  } else if (g.soilMoisture !== null && g.soilMoisture !== undefined) {
    const label = g.soilSensors && g.soilSensors.length === 1 ? g.soilSensors[0].name : 'Bodenfeuchte';
    soilHtml = `<div onclick="showTrend('${gid}','soilMoisture','Bodenfeuchte','%',${soilMin},${soilMax})" style="cursor:pointer" title="Trend anzeigen">${
      climateValHtml(g.soilMoisture, '%', label, isCtrlSoil, soilMin, soilMax, null, 0)}</div>`;
  }

  const co2Min = g.setpointCo2Target != null && g.setpointCo2Tolerance != null ? g.setpointCo2Target - g.setpointCo2Tolerance : null;
  const co2Max = g.setpointCo2Target != null && g.setpointCo2Tolerance != null ? g.setpointCo2Target + g.setpointCo2Tolerance : null;
  const co2Html = g.co2 !== null && g.co2 !== undefined
    ? `<div onclick="showTrend('${gid}','co2','CO₂','ppm',${co2Min},${co2Max})" style="cursor:pointer" title="Trend anzeigen">${climateValHtml(
        g.co2, ' ppm', 'CO₂', isCtrlCo2, co2Min, co2Max, null, 0)}</div>`
    : '';

  let leafTempHtml = '';
  if (g.leafSensors && g.leafSensors.length > 1) {
    leafTempHtml = g.leafSensors.map(s =>
      `<div>${climateValHtml(s.value, '°', s.name, false, null, null, null, 1)}</div>`
    ).join('');
  } else if (g.leafTemperature !== null && g.leafTemperature !== undefined) {
    leafTempHtml = `<div>${climateValHtml(g.leafTemperature, '°', 'Blatt-T', false, null, null, null, 1)}</div>`;
  }

  // Außensensor-Zeile
  const outdoorHtml = (g.outdoorTemp !== null && g.outdoorTemp !== undefined) || (g.outdoorHumidity !== null && g.outdoorHumidity !== undefined)
    ? `<div class="outdoor-row">
        <span class="outdoor-label">🌡 Außen:</span>
        ${g.outdoorTemp !== null && g.outdoorTemp !== undefined ? `<span class="outdoor-val">${g.outdoorTemp.toFixed(1)}°</span>` : ''}
        ${g.outdoorHumidity !== null && g.outdoorHumidity !== undefined ? `<span class="outdoor-val">${g.outdoorHumidity.toFixed(0)}%</span>` : ''}
      </div>`
    : '';

  const actHtml = g.actuators && g.actuators.length > 0
    ? `<div class="actuators"><div class="act-title">Aktoren</div>
       ${g.actuators.map(a => actuatorHtml(a, g.id, g.name, g.manualOverrides, isManual)).join('')}</div>`
    : '';

  const alarmHtml = g.alarms && g.alarms.length > 0
    ? `<div class="card-alarms">${g.alarms.map(a => {
        const c = SEV_COLORS[a.severity] ?? 'var(--text-dim)';
        return `<div class="card-alarm"><div class="sev-dot" style="background:${c}"></div>
          <span style="color:${c}">[${esc((a.severity ?? 'unknown').toUpperCase())}]</span> ${esc(a.code)}: ${esc(a.message)}</div>`;
      }).join('')}</div>`
    : '';

  const camSrc = camCache[g.id] || '';
  const cameraHtml = g.cameraUrl
    ? `<div class="card-camera">
        <div class="cam-thumb-wrap" onclick="openAnalysisModal('${gid}','${escAttr(g.cameraUrl)}')">
          <img class="cam-thumb" id="cam-thumb-${esc(g.id)}"
            src="${camSrc}" alt="📷"
            style="${camSrc ? '' : 'opacity:0.3'}" />
          <div class="cam-thumb-overlay">📷 Klicken zum Analysieren</div>
        </div>
        <div id="plant-result-${esc(g.id)}" class="plant-result" style="display:none"></div>
      </div>`
    : '';
  // Register camera for auto-refresh
  if (g.cameraUrl) camUrls[g.id] = g.cameraUrl;

  const irrigBadge = g.irrigationRunning
    ? '<div class="irrig-badge running">💧 Bewässerung aktiv</div>'
    : '<div class="irrig-badge"></div>';

  const modeToggle = `<div class="mode-toggle">
      <button class="mode-btn ${!isManual ? 'active-auto' : ''}"
        onclick="sendMode('${escAttr(g.id)}','auto','${escAttr(g.name)}')">AUTO</button>
      <button class="mode-btn ${isManual ? 'active-manual' : ''}"
        onclick="sendMode('${escAttr(g.id)}','manual','${escAttr(g.name)}')">MANUELL</button>
    </div>`;

  return `<div class="group-card" id="card-${esc(g.id)}">
    <div class="card-header">
      <div class="card-name">
        <div class="color-dot" style="background:${esc(g.color)}"></div>
        ${esc(g.name)}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${modeToggle}
        <span class="health-badge" style="background:${healthColor}22;color:${healthColor};border:1px solid ${healthColor}">${esc(g.health)}</span>
      </div>
    </div>
    ${actIconsHtml(g.actuators, g.id, g.manualOverrides)}
    <div class="climate-row">${tempHtml}${humHtml}${vpdHtml}${soilHtml}${co2Html}${leafTempHtml}</div>
    ${diagHintHtml(g)}
    ${outdoorHtml}
    <div class="meta-row">
      <span class="meta-tag phase">${PHASE_LABELS[g.phase] ?? esc(g.phase)}</span>
      <span class="meta-tag mode">${MODE_LABELS[g.mode] ?? esc(g.mode)}</span>
      ${dayNightTag}
      ${monitorTag}
      ${qualityBadgeHtml(g)}
    </div>
    ${irrigBadge}
    ${actHtml}
    ${alarmHtml}
    ${cameraHtml}
    <div data-ls-bar="${esc(g.id)}">${lsBarHtml(g.id)}</div>
    <div style="padding:6px 12px 10px;display:flex;justify-content:flex-end;gap:6px">
      <button class="db-btn" onclick="showLs('${gid}','${escAttr(g.name)}')">🗓 Kalender</button>
      <button class="db-btn" onclick="showDb('${gid}','${escAttr(g.name)}')">📊 Verlaufsdaten</button>
    </div>
  </div>`;
}

function renderStats(state) {
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><span class="label">Adapter</span>
      <span class="value" style="color:${state.health==='running'?'var(--green-light)':'var(--orange)'}">${esc(state.health)}</span></div>
    <div class="stat-chip"><span class="label">Gruppen</span><span class="value">${state.groups.length}</span></div>
    <div class="stat-chip"><span class="label">Alarme</span>
      <span class="value" style="color:${state.activeAlarms>0?'var(--red)':'var(--green-light)'}">${+state.activeAlarms}</span></div>
    <div class="stat-chip"><span class="label">Version</span>
      <span class="value" style="color:var(--text-dim)">${esc(state.adapterVersion)}</span></div>
    <button class="wiki-btn" onclick="wikiOpen()">📖 Sortenwiki</button>`;
}

function renderAlarmBanner(state) {
  const b = document.getElementById('alarmBanner');
  if (state.activeAlarms > 0) {
    document.getElementById('alarmBannerText').textContent =
      `${state.activeAlarms} aktive${state.activeAlarms===1?'r':''} Alarm${state.activeAlarms!==1?'e':''}`;
    b.classList.add('visible');
  } else { b.classList.remove('visible'); }
}

function render(state) {
  renderStats(state);
  renderAlarmBanner(state);
  const grid = document.getElementById('groupsGrid');
  if (!state.groups || state.groups.length === 0) {
    grid.innerHTML = `<div class="empty-state"><h2>Keine Gruppen konfiguriert</h2>
      <p>Lege Gruppen in der ioBroker Admin-Oberfläche an.</p></div>`;
    return;
  }
  // Lifestyle-Daten laden (nur beim ersten Mal pro Gruppe), dann rendern.
  // Generation-Counter verhindert Race Condition: wenn SSE schnell feuert und mehrere
  // loadAllLifestyle-Promises in-flight sind, rendert nur das zuletzt gestartete.
  window._dashState = state;
  if (!window._renderGen) window._renderGen = 0;
  const myGen = ++window._renderGen;
  loadAllLifestyle(state.groups).then(() => {
    if (window._renderGen !== myGen) return; // neueres render() ist bereits in-flight
    // Reset camUrls before re-render so stale groups are removed
    for (const k of Object.keys(camUrls)) delete camUrls[k];
    grid.innerHTML = state.groups.map(groupCardHtml).join('');
    initCamThumbs();
    restorePlantResults().catch(() => {});
  });
}

function setConnected(val) {
  connected = val;
  document.getElementById('connDot').className = 'conn-dot' + (val ? ' connected' : '');
  document.getElementById('connLabel').textContent = val ? 'Verbunden' : 'Getrennt';
  document.getElementById('reconnectOverlay').classList.toggle('visible', !val);
}
function updateTimestamp() {
  document.getElementById('lastUpdate').textContent = 'Zuletzt: ' + new Date().toLocaleTimeString('de-DE');
}

function connect() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  clearTimeout(reconnectTimer);
  eventSource = new EventSource('/api/events');
  eventSource.onopen = () => setConnected(true);
  eventSource.onmessage = evt => {
    try { render(JSON.parse(evt.data)); updateTimestamp(); if (!connected) setConnected(true); }
    catch(e) { console.error('Parse error', e); }
  };
  eventSource.onerror = () => {
    setConnected(false);
    if (eventSource) { eventSource.close(); eventSource = null; }
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };
}

let wikiStrains = [];
let wikiSelected = null; // id der aktuell angezeigten Sorte

async function wikiOpen() {
  const overlay = document.getElementById('wikiOverlay');
  if (!overlay.dataset.listenerAdded) {
    document.getElementById('wikiList').addEventListener('click', e => {
      const item = e.target.closest('[data-strain-id]');
      if (item) wikiShowDetail(item.dataset.strainId);
    });
    overlay.dataset.listenerAdded = '1';
  }
  overlay.classList.add('open');
  await wikiLoad();
}
function wikiClose() {
  document.getElementById('wikiOverlay').classList.remove('open');
}

async function wikiLoad() {
  try {
    const r = await fetch('/api/strains');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    wikiStrains = Array.isArray(data) ? data : [];
  } catch(e) {
    wikiStrains = [];
  }
  wikiRenderList();
  if (wikiSelected) {
    const still = wikiStrains.find(s => s.id === wikiSelected);
    if (still) wikiShowDetail(wikiSelected);
    else { wikiSelected = null; wikiRenderEmpty(); }
  } else {
    wikiRenderEmpty();
  }
}

function wikiRenderEmpty() {
  document.getElementById('wikiDetail').innerHTML =
    `<div class="wiki-empty-state"><span style="font-size:48px">🌿</span><p>Sorte auswählen oder neue anlegen</p></div>`;
}

function wikiTypeBadge(s) {
  const map = { sativa:'Sativa', indica:'Indica', hybrid:'Hybrid' };

  return `<span class="wiki-badge ${safeType}">${map[s.type] ?? safeType}</span>`;

  const map = { einfach:['easy','Einfach'], mittel:['medium','Mittel'], schwer:['hard','Schwer'] };
  const [cls, label] = map[s.difficulty] ?? ['medium','Mittel'];
  return `<span class="wiki-badge ${cls}">${label}</span>`;

function wikiRenderList() {
  const q = (document.getElementById('wikiSearch').value || '').toLowerCase();
  const filtered = wikiStrains.filter(s => (s.name||'').toLowerCase().includes(q) || (s.breeder||'').toLowerCase().includes(q));
  const listEl = document.getElementById('wikiList');
  if (!filtered.length) {
    listEl.innerHTML = `<div style="padding:20px;color:var(--text-dim);font-size:13px;text-align:center">Keine Ergebnisse</div>`;
    return;
  }
  listEl.innerHTML = filtered.map(s => {
    const totalW = (s.growWeeks||0) + (s.bloomWeeks||0);
    const active = s.id === wikiSelected ? ' active' : '';
    return `<div class="wiki-list-item${active}" data-strain-id="${esc(s.id)}">
      <div class="wiki-list-name">${esc(s.name)}</div>
      <div class="wiki-list-sub">${s.breeder ? esc(s.breeder) + ' · ' : ''}${totalW}W gesamt</div>
